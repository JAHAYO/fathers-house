<meta charset="utf-8">
<title>다시, 아버지의 집으로</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --paper:#FBFAF7; --ink:#1C1B18; --gold:#B08A2E; --gold-2:#D9B45C;
  --grey:#6F6B60; --hair:#E7E3D8; --serif:'Noto Serif KR','Nanum Myeongjo',Batang,'Apple SD Gothic Neo',serif;
  --sans:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
}
*{box-sizing:border-box}
html{background:var(--paper)}
body{margin:0;color:var(--ink);font-family:var(--serif);word-break:keep-all;-webkit-font-smoothing:antialiased}
a{color:inherit}
#thread{position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-2));z-index:9}
.wrap{max-width:680px;margin:0 auto;padding:0 22px}

/* ---------- 표지 / 목차 ---------- */
.cover{padding:76px 0 40px;text-align:center}
.eyebrow{font-family:var(--sans);font-size:12px;letter-spacing:.35em;color:var(--gold);margin-bottom:26px}
h1.title{font-size:clamp(30px,6vw,44px);font-weight:700;letter-spacing:.06em;margin:0 0 14px;text-wrap:balance}
.subtitle{color:var(--grey);font-size:15px;margin:0 0 30px}
.stitch{width:190px;height:16px;margin:0 auto;display:block}
.toc{list-style:none;margin:34px auto 90px;padding:0;border-top:1px solid var(--hair)}
.toc li{border-bottom:1px solid var(--hair)}
.toc a{display:flex;align-items:baseline;gap:18px;padding:19px 6px;text-decoration:none;transition:background .15s}
.toc a:hover,.toc a:focus-visible{background:#F4F1E8}
.toc .num{font-family:var(--sans);font-size:12px;letter-spacing:.14em;color:var(--gold);min-width:52px}
.toc .t{flex:1;font-size:17px}
.toc .meta{font-family:var(--sans);font-size:12px;color:var(--grey);display:flex;gap:10px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;border:1px solid var(--gold);display:inline-block}
.read .dot{background:var(--gold)}
.read .t{color:var(--grey)}

/* ---------- 리더 ---------- */
.reader-top{position:sticky;top:0;background:color-mix(in srgb,var(--paper) 92%,transparent);backdrop-filter:blur(6px);border-bottom:1px solid var(--hair);z-index:5}
.reader-top .in{max-width:680px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;font-family:var(--sans);font-size:13px}
.reader-top a{text-decoration:none;color:var(--grey)}
.reader-top .ep{letter-spacing:.2em;color:var(--gold)}
article{padding:52px 0 30px}
.ep-label{font-family:var(--sans);font-size:12px;letter-spacing:.3em;color:var(--gold);text-align:center;margin-bottom:14px}
h2.ep-title{font-size:clamp(23px,4.6vw,30px);text-align:center;margin:0 0 8px;text-wrap:balance;line-height:1.45}
.ep-rule{width:44px;height:1px;background:var(--gold);margin:26px auto 44px}
article h3{font-size:19.5px;margin:52px 0 4px;line-height:1.6;text-wrap:balance}
article h3::before{content:"";display:block;width:22px;height:1px;background:var(--gold);margin-bottom:14px}
article p{font-size:17.5px;line-height:1.98;margin:1.15em 0}
p.core{border-left:2px solid var(--gold);padding:4px 0 4px 20px;font-size:18px;line-height:1.95}
p.core strong,article strong{font-weight:700}
.vref{color:var(--grey);font-size:.82em}
sup.fn a{font-family:var(--sans);font-size:11px;color:var(--gold);text-decoration:none;padding:0 2px}
.footnote{font-size:14.5px;line-height:1.85;color:var(--grey);border-top:1px solid var(--hair);margin:40px 0 0;padding:14px 0 0}
.fnlabel{font-family:var(--sans);font-size:11px;color:var(--gold);letter-spacing:.2em;margin-right:6px}
.fnback{text-decoration:none}
.table-wrap{overflow-x:auto;margin:30px 0;border:1px solid var(--hair)}
table{border-collapse:collapse;width:100%;font-size:14.5px;line-height:1.7;min-width:520px}
th{font-family:var(--sans);font-size:12.5px;letter-spacing:.05em;text-align:left;color:var(--grey);font-weight:600;border-bottom:1px solid var(--ink)}
th,td{padding:11px 14px;vertical-align:top}
td{border-bottom:1px solid var(--hair)}
.map-fig{margin:36px 0 10px}
.map-fig svg{width:100%;height:auto}
.scn circle{fill:var(--paper);stroke:var(--ink);stroke-width:1.4}
.scn text{font-size:14px;fill:var(--ink)}
.scn .scnt{font-size:12.5px;fill:var(--ink)}
.scn.gold circle{stroke:var(--gold);stroke-width:2}
.scn.dark circle{stroke:#4A463F;stroke-width:2;stroke-dasharray:3 3}
.thread{font-size:11.5px}
.gold-t{fill:var(--gold)}
.dark-t{fill:#4A463F}
.era text{font-size:11.5px;fill:var(--grey)}
.silence{font-size:11px;fill:var(--grey);letter-spacing:.1em}
.bigl text{font-size:14.5px;fill:var(--ink);font-weight:700}
.quest text{font-size:12.5px;fill:var(--gold)}
.here{font-size:11px;fill:var(--gold)}

/* ---------- 웹툰판 ---------- */
.wt{background:#151311;color:#E8E4DB;margin:10px -22px 0;padding:38px 0 46px}
.wt-open{font-family:var(--sans);font-size:12.5px;color:#8F8A7D;text-align:center;max-width:420px;margin:0 auto 10px;padding:0 20px;line-height:1.8}
.wt-label{font-family:var(--sans);font-size:11px;letter-spacing:.34em;color:var(--gold-2);text-align:center;margin:72px 0 20px}
.wt-scene{max-width:620px;margin:0 auto 84px;padding:0 18px}
.wt .frame{margin:0;box-shadow:0 0 0 1px #2B2823,0 20px 44px rgba(0,0,0,.55)}
.wt img{width:100%;display:block;filter:sepia(.16) contrast(1.04) brightness(.96)}
.wt .narr{background:var(--paper);color:var(--ink);font-size:15.5px;line-height:1.9;padding:15px 20px;max-width:430px;margin:24px auto 0;box-shadow:0 6px 18px rgba(0,0,0,.4)}
.wt .narr.on{margin-top:-30px;position:relative;z-index:2}
.wt .say{color:var(--gold-2);text-align:center;font-size:17px;line-height:1.9;max-width:430px;margin:32px auto}
.wt .say.whisper{font-size:15px;letter-spacing:.12em;color:#B8A97F;margin-bottom:26px}
.wt .cap{font-size:13.5px;color:#A59E8D;text-align:center;margin-top:18px}
.wt .wref{font-size:.82em;color:#7C776A}
.wt-end{text-align:center;padding:40px 20px 0;font-size:16px;line-height:2.1;color:#CFC9BB}
.wt-callout{color:var(--gold-2);font-size:20px;margin:34px 0}
.wt-next{font-family:var(--sans);font-size:12px;letter-spacing:.22em;color:#8F8A7D;margin-top:46px}
.wt .credit{font-family:var(--sans);font-size:11px;color:#6E6A60;text-align:center;margin:64px 16px 0;line-height:1.7}
@media (max-width:724px){.wt{margin:10px calc(50% - 50vw) 0}}

/* ---------- 어린이 웹툰 ---------- */
.wtk{background:#FFF6E3;margin:10px -22px 0;padding:36px 16px 52px;font-family:var(--sans)}
.wtk-open{font-size:14px;color:#8A6B3F;text-align:center;margin:0 auto 30px;font-weight:600}
.wtk-panel{display:block;width:100%;max-width:620px;margin:0 auto;filter:drop-shadow(0 8px 16px rgba(138,107,63,.18))}
.wtk-panel text{font-family:var(--sans)}
.wtk-narr{background:#FFFFFF;border:3px solid #F0C96B;border-radius:22px;max-width:520px;margin:20px auto 58px;padding:16px 22px;font-size:16.5px;line-height:1.85;color:#4A3A22;text-align:center;font-weight:600}
.wtk-narr strong{color:#B08A2E}
.wtk-next{text-align:center;font-size:15px;font-weight:700;letter-spacing:.06em;color:#B08A2E;background:#FFFFFF;border:3px dashed #F0C96B;border-radius:999px;max-width:420px;margin:8px auto 0;padding:14px 20px}

/* 회차 이동 */
.epnav{display:flex;gap:12px;margin:70px 0 90px;font-family:var(--sans)}
.epnav a{flex:1;border:1px solid var(--hair);padding:16px 18px;text-decoration:none;transition:border-color .15s}
.epnav a:hover,.epnav a:focus-visible{border-color:var(--gold)}
.epnav .dir{font-size:11px;letter-spacing:.2em;color:var(--gold);display:block;margin-bottom:7px}
.epnav .nt{font-size:14.5px;line-height:1.5}
.epnav .next{text-align:right}
.epnav .ghost{visibility:hidden}
footer{border-top:1px solid var(--hair);padding:26px 0 60px;text-align:center;font-family:var(--sans);font-size:12px;color:var(--grey)}
@media (prefers-reduced-motion:no-preference){
  article,.cover{animation:fade .45s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
</style>
<div id="thread"></div>
<div id="app" class="wrap"></div>
<script>
const EPS = [{"id": "prologue", "label": "프롤로그", "title": "일러두기 — 이 책이 그림을 그리는 방식", "mins": 1, "html": "<p>화가는 그림을 한 번에 완성하지 않는다. 먼저 연필로 큰 덩어리를 잡고, 윤곽을 긋고, 형태를 세우고, 그다음에야 색을 입힌다. 이 책도 그렇게 쓰였다.</p>\n<p>1부는 성경 전체를 단 한 문장으로 압축한 스케치다. 2부는 그 문장을 구약과 신약이라는 두 덩어리로 나눈 밑그림이고, 3부는 창조에서 완성까지 일곱 장면으로 윤곽선을 긋는다. 4부는 그 일곱 장면을 예순여섯 권의 책과 시대의 지도 위에 얹어 형태를 세운다. 이후의 장들에서 구약과 신약을 각각 자세히 채색하고, 마지막에는 예순여섯 권을 한 권씩 들여다보며 그림을 완성할 것이다.</p>\n<p>같은 그림을 여러 번 그리는 셈이다. 그러나 그때마다 그림은 조금씩 선명해진다. 성경이라는 거대한 숲에서 길을 잃지 않는 가장 확실한 방법은, 숲에 들어가기 전에 숲 전체의 지도를 먼저 손에 쥐는 것이다.</p>"}, {"id": "ep1", "label": "제1화", "title": "스케치 — 한 문장으로 읽는 성경", "mins": 1, "html": "<p>성경은 예순여섯 권의 책이다. 천오백 년에 걸쳐 사십여 명의 손으로 기록되었고, 그 안에는 역사와 율법과 시와 예언과 편지가 뒤섞여 있다. 이 방대한 책을 단 한 문장으로 줄이면 무엇이 남을까.</p>\n<p class=\"core\">온 우주의 왕이신 하나님이 인간을 자녀로 지으시고 세상을 다스릴 왕자로 세우셨으나, 인간은 아버지의 왕좌를 탐내다 반역자가 되어 스스로 고아의 길로 걸어 나갔고, 왕은 그 반역자를 버리는 대신 친아들을 보내어 아들의 목숨으로 반역의 값을 치르시고, 고아를 다시 자녀로, 잃어버린 왕자를 다시 함께 다스리는 자리로 데려오신다.</p>\n<p>성경은 종교 규칙집이 아니다. 도덕 교과서도, 위인들의 전기 모음도 아니다. 성경은 처음부터 끝까지 하나의 드라마, 곧 아버지와 자녀 사이에 벌어진 배신과 회복의 드라마다. 그래서 첫 페이지는 \"태초에 하나님이\"로 열리고, 마지막 페이지는 자녀들이 아버지의 얼굴을 마주 보며 영원히 다스리는 장면으로 닫힌다. 그 사이의 모든 기록은, 집 나간 자식을 향한 한 아버지의 길고 집요한 사랑의 흔적이다.</p>"}, {"id": "ep2", "label": "제2화", "title": "밑그림 — 두 문장으로 읽는 성경", "mins": 2, "html": "<h3>구약 — 무너진 왕자, 포기하지 않는 아버지</h3>\n<p>구약은 반역 이후의 이야기다. 왕좌를 넘보다 동산에서 쫓겨난 인간은 이제 아버지 없이 스스로 왕이 되어 보려 한다. 그러나 유한한 피조물이 무한하신 분의 자리를 감당할 수는 없는 법이어서, 그 자리는 채워지지 않는 공허로 남는다. 사람들은 그 공허를 금송아지로, 바알로, 권력과 재물과 이방의 신들로 메우려 했고, 구약의 역사는 그 헛된 시도가 지겹도록 반복되는 기록이다.</p>\n<p>그런데 그 실패의 역사 한복판을 다른 이야기 하나가 꿰뚫고 지나간다. 아버지가 자녀를 찾아오시는 이야기다. 하나님은 아브라함 한 사람을 부르시고, 이스라엘과 언약을 맺으시고, 그들이 넘어질 때마다 선지자를 보내시며, 언젠가 이 모든 것을 되돌릴 참 아들, 참 왕을 보내겠다고 거듭 약속하신다.</p>\n<p>구약을 한 문장으로 줄이면 이렇다. <strong>반역으로 왕자의 영광을 잃은 인간이 우상을 붙들고 방황하는 동안, 왕이신 아버지는 한 민족을 택해 언약을 맺으시고, 잃어버린 것을 모두 되찾아 줄 참 왕자를 약속하신다.</strong></p>\n<h3>신약 — 돌아온 참 아들, 다시 자녀가 된 고아들</h3>\n<p>신약은 그 약속이 사람이 되어 역사 속으로 걸어 들어온 이야기다. 참 아들 예수는 인류 가운데 유일하게 반역한 적 없는 분이었으나, 반역자들의 형벌을 자기 몸으로 짊어지셨다. 십자가에서 고아들의 빚이 청산되었고, 부활과 승천으로 왕좌가 회복되었으며, 이제 그를 영접하는 모든 사람에게 자녀의 이름과 자리가 되돌려진다.</p>\n<p>신약을 한 문장으로 줄이면 이렇다. <strong>약속대로 오신 참 아들 예수께서 반역자의 형벌을 십자가에서 대신 지시고 부활과 승천으로 왕좌에 오르셔서, 그를 영접하는 모든 고아를 양자로 삼으시고, 마침내 자녀들과 함께 다스릴 영원한 나라를 여신다.</strong></p>"}, {"id": "ep3", "label": "제3화", "title": "윤곽선 — 일곱 장면으로 읽는 성경", "mins": 9, "html": "<h3>장면 1. 왕의 세계, 왕자의 임명 — 창조</h3>\n<p>이야기는 왕좌에서 시작된다. \"여호와께서 그의 보좌를 하늘에 세우시고 그의 왕권으로 만유를 다스리시도다\"<span class=\"vref\">(시 103:19)</span>. 우주는 무주공산이 아니라 한 분 왕의 나라이며, 창세기 1장의 창조 기사는 그 왕이 자기 궁전을 짓는 장면이다.</p>\n<p>그리고 그 궁전의 마지막 날, 왕은 특별한 존재를 세운다. 고대 근동에서 왕들은 자신이 다스리는 땅 곳곳에 자기 '형상'을 세웠다. 그 형상이 서 있는 곳마다 왕의 통치가 미친다는 선언이었다. 창세기가 인간을 \"하나님의 형상\"이라 부를 때<span class=\"vref\">(창 1:26-27)</span>, 바로 그 그림을 그리고 있다. 인간은 왕의 대리 통치자로 이 땅에 세워졌다. \"생육하고 번성하여 땅에 충만하라, 땅을 정복하라, 다스리라\"<span class=\"vref\">(창 1:28)</span>.</p>\n<p>그런데 인간은 대리인만이 아니었다. 누가는 예수의 족보를 거슬러 올라가며 아담을 \"하나님의 아들\"이라 부른다<span class=\"vref\">(눅 3:38)</span>. 자녀이면서 통치자 — 한 단어로 하면 왕자다. 시편 기자는 이렇게 노래했다. \"그를 하나님보다 조금 못하게 하시고 영화와 존귀로 관을 씌우셨나이다\"<span class=\"vref\">(시 8:5)</span>. 인간의 머리에는 처음부터 관이 씌워져 있었다.</p>\n<p>에덴은 그 왕자가 아버지와 함께 살던 집이었다. 그리고 창조의 이레째, 하나님은 안식하셨다<span class=\"vref\">(창 2:2-3)</span>. 안식은 피곤한 신의 낮잠이 아니라 완성된 나라의 평화, 왕의 임재 안에서만 누릴 수 있는 완전한 쉼이었다. 인간은 바로 그 쉼 속에서 살도록 지어진 존재였다.</p>\n<h3>장면 2. 왕좌를 넘본 왕자 — 반역</h3>\n<p>뱀의 유혹은 과일 한 알의 문제가 아니었다. \"너희가... 하나님과 같이 되어\"<span class=\"vref\">(창 3:5)</span>. 문제는 열매가 아니라 자리였다. 이미 왕자였던 존재가 왕이 되려 했다. 받은 관에 만족하지 못하고 아버지의 관을 넘봤다. 성경이 죄라고 부르는 것의 뿌리가 여기에 있다. 죄는 규칙 위반이기 이전에 반역, 곧 왕을 왕좌에서 끌어내리고 그 자리에 자기가 앉으려는 시도다.</p>\n<p>그러나 유한한 존재는 무한한 자리를 감당할 수 없다. 왕좌를 향해 뻗은 손에 남은 것은 영광이 아니라 수치와 두려움이었다. 인간은 옷을 지어 몸을 가렸고, 나무 사이에 숨었고<span class=\"vref\">(창 3:8)</span>, 끝내 동산에서 쫓겨났다.</p>\n<p>왕관이 통째로 회수된 것은 아니다. 타락 이후에도 성경은 인간을 여전히 하나님의 형상이라 부르고<span class=\"vref\">(창 9:6)</span>, 인간은 여전히 땅을 다스린다. 다만 그 관은 부서졌고, 통치는 뒤틀렸다. 땅은 가시덤불로 저항하고, 다스림은 수고가 되었다<span class=\"vref\">(창 3:17-19)</span>. 신약의 한 기자는 이 상태를 정확히 짚는다. \"지금 우리가 만물이 아직 그에게 복종하고 있는 것을 보지 못하고\"<span class=\"vref\">(히 2:8)</span>.</p>\n<p>그리고 무엇보다, 아버지의 집을 잃었다. 반역자는 그 순간 고아가 되었다. 누가 내쫓기 전에 스스로 등을 돌린 고아. 성경의 나머지 전부는, 이 고아를 다시 집으로 데려오는 이야기다.</p>\n<h3>장면 3. 터진 웅덩이를 파는 사람들 — 우상</h3>\n<p>하나님이 계시던 자리는 하나님 크기의 빈자리로 남았다. 그리고 인간은 빈 왕좌를 견디지 못하는 존재다. 하나님을 밀어낸 마음은 반드시 다른 무언가를 그 자리에 앉힌다. 성경은 이것을 우상숭배라 부르며, 예레미야는 그 어리석음을 이렇게 탄식했다. \"내 백성이 두 가지 악을 행하였나니 곧 그들이 생수의 근원되는 나를 버린 것과 스스로 웅덩이를 판 것인데 그것은 그 물을 가두지 못할 터진 웅덩이들이니라\"<span class=\"vref\">(렘 2:13)</span>.</p>\n<p>우상은 나무와 돌만이 아니다. 시내산 아래의 금송아지와 가나안의 바알은 오늘날 돈과 성공, 권력과 타인의 인정, 쾌락이라는 이름으로 옷만 갈아입었다. 바울의 진단은 시대를 관통한다. 인간은 \"피조물을 조물주보다 더 경배하고 섬기는\" 존재가 되었다<span class=\"vref\">(롬 1:25)</span>.</p>\n<p>그러나 유한한 것은 무한한 갈증을 끄지 못한다. \"이 물을 마시는 자마다 다시 목마르려니와\"<span class=\"vref\">(요 4:13)</span>. 부와 지혜와 쾌락을 끝까지 가져 본 전도자의 결론은 \"헛되고 헛되며 헛되고 헛되니 모든 것이 헛되도다\"<span class=\"vref\">(전 1:2)</span>였다. 훗날 어거스틴은 이 오랜 진실을 한 문장으로 눌러 담았다. 주님을 향해 지어진 우리 마음은, 주 안에서 안식하기까지 결코 쉼을 얻지 못한다고.</p>\n<p>반역한 왕자는 세상 무엇을 손에 넣어도 아버지의 집에서 누리던 그 안식으로 돌아가지 못한다. 성경이 그리는 인간의 비극은 벌을 받는 것 이전에, 쉼을 잃은 것이다.</p>\n<h3>장면 4. 포기하지 않는 아버지 — 언약</h3>\n<p>반역 직후 하나님의 첫 마디를 기억할 필요가 있다. 그것은 심판 선고가 아니라 부르심이었다. \"네가 어디 있느냐\"<span class=\"vref\">(창 3:9)</span>. 몰라서 물으신 것이 아니다. 숨은 자식을 찾아 나선 아버지의 음성이다. 그리고 저주가 선포되는 한가운데서 약속 하나가 심긴다. 여자의 후손이 뱀의 머리를 상하게 하리라는 것<span class=\"vref\">(창 3:15)</span>. 교회는 오래전부터 이 구절을 '최초의 복음'이라 불러왔다.</p>\n<p>이후 구약 전체는 이 씨앗 하나가 자라나는 과정이다. 하나님은 아브라함 한 사람을 불러 \"땅의 모든 족속이 너로 말미암아 복을 얻을 것\"이라 약속하시고<span class=\"vref\">(창 12:3)</span>, 시내산에서 이스라엘을 \"제사장 나라\"로 세우시고<span class=\"vref\">(출 19:6)</span>, 다윗에게는 \"네 왕위가 영원히 견고하리라\" 맹세하신다<span class=\"vref\">(삼하 7:16)</span>. 그러나 택함받은 백성조차 금송아지 앞에 춤추고 바알 앞에 무릎 꿇으며 언약을 부수고 또 부순다. 그때 하나님은 심판 너머의 새 언약을 예고하신다. \"나의 법을 그들의 속에 두며 그들의 마음에 기록하여 나는 그들의 하나님이 되고 그들은 내 백성이 될 것이라\"<span class=\"vref\">(렘 31:33)</span>.</p>\n<p>그러니 구약은 세 겹의 실로 짜인 천이다. 끝없이 실패하는 자녀, 끝내 포기하지 않는 아버지, 그리고 페이지를 넘길수록 또렷해지는 한 사람의 그림자 — 오실 참 왕자.</p>\n<h3>장면 5. 참 아들이 오시다 — 성육신과 십자가</h3>\n<p>\"말씀이 육신이 되어 우리 가운데 거하시매\"<span class=\"vref\">(요 1:14)</span>. 약속된 왕자는 왕궁이 아니라 구유에 오셨다. 첫 아담이 풍요로운 동산에서 무너졌던 그 시험을, 둘째 아담은 굶주린 광야에서 이겨내셨다<span class=\"vref\">(마 4장)</span>. 그분은 인류 역사상 유일하게 반역한 적 없는 아들이었다.</p>\n<p>그런데 그 유일한 무죄자가 반역자의 형틀에 달린다. 처형의 날 감옥에는 바라바가 있었다. 민란을 일으키고 사람을 죽인 자, 말 그대로 반역자였다<span class=\"vref\">(막 15:7)</span>.<sup class=\"fn\"><a href=\"#fn-바라바\" id=\"fnref-바라바\">주</a></sup> 군중은 반역자를 놓아주고 왕을 못 박으라 외쳤고, 그대로 되었다. 반역자가 풀려나고 왕이 반역자의 자리에서 죽는 것 — 역사상 가장 어처구니없는 이 교환이, 사실은 복음의 심장이다. 바라바의 자리는 우리 모두의 자리였기 때문이다. \"하나님이 죄를 알지도 못하신 이를 우리를 대신하여 죄로 삼으신 것은 우리로 하여금 그 안에서 하나님의 의가 되게 하려 하심이라\"<span class=\"vref\">(고후 5:21)</span>.</p>\n<p>십자가 위에는 명패가 붙어 있었다. \"유대인의 왕.\" 로마 총독이 조롱으로 쓴 글자였지만, 하늘은 그것을 진실로 읽었다. 왕은 왕좌 대신 십자가에서 자기 백성을 위해 죽음으로써, 반역이 시작한 이야기를 사랑으로 뒤집으셨다.</p>\n<aside class=\"footnote\" id=\"fn-바라바\"><span class=\"fnlabel\">주</span> 일부 고대 사본은 그의 이름을 '예수 바라바'로 전한다(마 27:16-17 난외주). 그렇다면 총독이 군중에게 던진 질문은 사실상 이것이었다. 어느 예수를 원하느냐 — 스스로 왕이 되려던 반역자 예수인가, 반역자를 위해 죽으려는 왕 예수인가. <a class=\"fnback\" href=\"#fnref-바라바\">↩</a></aside>\n<h3>장면 6. 고아가 자녀가 되다 — 부활과 교회</h3>\n<p>사흘 만에 무덤이 열렸다. 부활은 단순한 소생이 아니라 즉위였다. 하나님은 그리스도를 \"죽은 자들 가운데서 다시 살리시고 하늘에서 자기의 오른편에 앉히사 모든 통치와 권세와 능력과 주권... 위에 뛰어나게 하셨다\"<span class=\"vref\">(엡 1:20-21)</span>. 왕좌는 다시 참 왕자의 것이 되었다.</p>\n<p>그리고 왕좌에 오른 아들이 하신 일은 고아들의 입양이었다. 떠나시기 전 밤, 그분은 약속하셨다. \"내가 너희를 고아와 같이 버려두지 아니하고 너희에게로 오리라\"<span class=\"vref\">(요 14:18)</span>. \"영접하는 자 곧 그 이름을 믿는 자들에게는 하나님의 자녀가 되는 권세를 주셨으니\"<span class=\"vref\">(요 1:12)</span>. 이제 그를 믿는 모든 사람은 종의 영이 아니라 \"양자의 영\"을 받아, 온 우주의 왕을 \"아빠 아버지\"라 부른다<span class=\"vref\">(롬 8:15)</span>. 그리고 자녀이면 상속자다<span class=\"vref\">(롬 8:17)</span>.</p>\n<p>교회는 그렇게 다시 자녀가 된 사람들의 공동체이며, 아직 집 밖을 떠도는 고아들에게 아버지의 초청장을 전하는 왕의 대사들이다<span class=\"vref\">(고후 5:20)</span>. 그 초청장에는 세상의 어떤 우상도 끝내 주지 못한 것이 적혀 있다. \"수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라\"<span class=\"vref\">(마 11:28)</span>.</p>\n<h3>장면 7. 다시 다스리는 자녀들 — 완성</h3>\n<p>이야기는 시작보다 더 좋은 끝을 향해 간다. 새 하늘과 새 땅, 하나님이 친히 사람들과 함께 거하시며 모든 눈물을 닦아 주시는 곳<span class=\"vref\">(계 21:1-4)</span>. 그곳에서 두 개의 선언이 이 긴 드라마의 막을 내린다.</p>\n<p>하나는 고아 이야기의 완결이다. \"나는 그의 하나님이 되고 그는 내 아들이 되리라\"<span class=\"vref\">(계 21:7)</span>. 또 하나는 왕자 이야기의 완결이다. \"그들이 세세토록 왕 노릇 하리로다\"<span class=\"vref\">(계 22:5)</span>. 에덴에서 부서졌던 관이 다시 씌워지되, 이번에는 결코 벗겨지지 않는 관이다.</p>\n<p>반역자였던 고아가 아버지의 얼굴을 마주 보며<span class=\"vref\">(계 22:4)</span> 영원히 함께 다스린다. 창세기 1장에서 연필로 그어졌던 첫 스케치가, 요한계시록 22장에서 마침내 완성된 그림으로 걸린다.</p>"}, {"id": "ep4", "label": "제4화", "title": "형태 — 예순여섯 권의 책장 위에 얹는 일곱 장면", "mins": 8, "html": "<p>윤곽선까지 그렸으니 이제 형태를 세울 차례다. 일곱 장면은 아름답지만, 아직 허공에 떠 있다. 저 장면들이 실제로 성경 어디에 적혀 있는가. 창세기를 펼치면 어느 장면 안에 서 있는 것이고, 이사야를 펼치면 어디쯤을 걷고 있는 것인가. 이 질문에 답하지 못하면 일곱 장면은 그럴듯한 요약으로 남을 뿐, 성경을 읽는 지도가 되지 못한다.</p>\n<p>먼저 짚어야 할 사실이 하나 있다. 많은 사람이 성경 앞에서 길을 잃는 이유는 성경이 어려워서가 아니라, 성경을 소설처럼 읽으려 하기 때문이다. 성경은 첫 장부터 마지막 장까지 시간 순서로 흐르는 한 권의 책이 아니다. 예순여섯 권이 꽂힌 하나의 서가이며, 그 책들은 연대순이 아니라 종류별로 꽂혀 있다. 도서관에서 역사 서가와 시집 서가가 다른 칸에 있듯이. 그러니 지도가 필요하다. 어느 칸에 어떤 책이 꽂혀 있고, 각 책이 이야기의 어느 지점에 서 있는지를 보여 주는 지도가.</p>\n<h3>구약의 책장 — 이야기, 노래, 음성</h3>\n<p>구약 서른아홉 권은 세 칸으로 나뉜다. <strong>역사서 열일곱 권, 시가서 다섯 권, 예언서 열일곱 권.</strong></p>\n<p><strong>역사서 열일곱 권</strong>(창세기부터 에스더까지)은 이야기의 등뼈다. 창조에서 시작해 족장들과 출애굽, 가나안 정착, 왕국의 흥망, 포로와 귀환까지 — 시간은 이 열일곱 권을 타고 흐른다. 그중 앞의 다섯 권(창세기·출애굽기·레위기·민수기·신명기)은 모세의 손을 거쳤다 하여 따로 율법서, 곧 모세오경이라 부른다.</p>\n<p><strong>시가서 다섯 권</strong>(욥기·시편·잠언·전도서·아가)은 그 역사 한복판에서 터져 나온 노래와 질문이다. 왜 의인이 고통받는가(욥기), 두렵고 기쁠 때 무어라 부르짖어야 하는가(시편), 어떻게 살아야 지혜로운가(잠언), 다 가져 보니 무엇이 남던가(전도서), 사랑은 얼마나 강한가(아가).</p>\n<p><strong>예언서 열일곱 권</strong> — 큰 책 다섯(이사야·예레미야·예레미야애가·에스겔·다니엘)과 작은 책 열둘 — 은 그 역사를 향해 아버지가 보내신 음성이다. 자녀들이 우상 앞으로 몰려갈 때마다 하나님은 사람을 보내 외치게 하셨다. 돌아오라고, 그리고 언젠가 모든 것을 되돌릴 한 사람이 오신다고.</p>\n<p>비유하자면 역사서는 무대이고, 시가서는 그 무대 위 인물들의 독백이며, 예언서는 무대 밖에서 들려오는 아버지의 음성이다. 이것을 알면 오래된 수수께끼 하나가 풀린다. 열왕기를 읽다가 이사야로 넘어가면 시간이 갑자기 뒤로 감기는 이유 — 두 책은 이어지는 이야기가 아니라, 같은 시대를 무대와 음성이라는 다른 자리에서 기록한 책이기 때문이다.</p>\n<h3>구약의 시간 — 여섯 시대</h3>\n<p>책장을 종류별로 살폈으니, 이제 시간순으로 다시 편다. 구약의 역사는 여섯 시대로 접힌다.</p>\n<div class=\"table-wrap\"><table><thead><tr><th>시대</th><th>무슨 일이 있었나</th><th>어느 책이 서 있나</th></tr></thead><tbody><tr><td>창조시대</td><td>창조, 반역, 홍수, 바벨</td><td>창세기 1~11장</td></tr><tr><td>족장시대</td><td>아브라함·이삭·야곱·요셉 — 한 가정을 부르시다</td><td>창세기 12~50장 · 욥기</td></tr><tr><td>모세시대</td><td>출애굽, 시내산 언약, 광야 사십 년</td><td>출애굽기 · 레위기 · 민수기 · 신명기</td></tr><tr><td>사사시대</td><td>가나안 정착, 반복되는 타락의 굴레</td><td>여호수아 · 사사기 · 룻기 · 사무엘상하 · 시편</td></tr><tr><td>왕정시대</td><td>다윗 언약, 왕국 분열, 멸망을 향한 내리막</td><td>열왕기상하 · 잠언 · 전도서 · 아가 · 예언서 다수</td></tr><tr><td>포로·귀환시대</td><td>바벨론 포로, 귀환, 성전과 성벽 재건</td><td>역대상하 · 에스라 · 느헤미야 · 에스더 · 다니엘 · 에스겔 · 학개 · 스가랴 · 말라기</td></tr></tbody></table></div>\n<p>이 지도 위에 일곱 장면을 얹으면 형태가 드러난다.</p>\n<p>먼저 놀라운 사실 하나. <strong>장면 1(창조)과 장면 2(반역)는 창세기의 첫 열한 장에 다 들어 있다.</strong> 왕의 세계와 왕자의 임명은 창세기 1~2장, 왕좌를 넘본 반역과 그 파문 — 추방, 첫 살인, 홍수, 바벨 — 은 창세기 3~11장이다. 천오백 년에 걸쳐 기록된 책이 그 서두의 몇 장에 이야기 전체의 문제를 심어 놓은 것이다.</p>\n<p><strong>장면 4(언약)는 창세기 12장에서 시작해 구약의 마지막 페이지까지 이어진다.</strong> 족장시대에 하나님은 아브라함 한 사람을 부르시고, 모세시대에 그 후손을 한 민족으로 세워 시내산에서 언약을 맺으시고, 왕정시대에 다윗에게 영원한 왕위를 맹세하시고, 모든 것이 무너진 포로시대에조차 마음에 새길 새 언약을 예고하신다. 언약은 구약이라는 천을 처음부터 끝까지 관통하는 금실이다.</p>\n<p>그리고 그 금실 곁에는 검은 실이 나란히 달린다. <strong>장면 3(우상)은 어느 한 시대의 사건이 아니라 전 시대를 흐르는 흐름이다.</strong> 모세시대의 금송아지, 사사시대의 끝없는 굴레 — 타락하고, 부르짖고, 구원받고, 다시 타락하는 — 왕정시대의 바알과 산당. 예언서 열일곱 권이 그토록 격렬한 것은 이 검은 실 때문이다. 그리고 끝내 그 실이 백성을 바벨론까지 끌고 간다. 포로기는 우상숭배라는 병의 말기 증상이었다.</p>\n<p>특히 왕정시대는 이 책 전체 이야기의 축소판처럼 읽힌다. 백성은 왕을 구했고, 왕들을 얻었으나, 사울부터 마지막 왕까지 인간 왕은 모두 조금씩 혹은 완전히 실패했다. 가장 빛나던 다윗조차 무너지는 장면이 기록되어 있다. 그렇게 구약은 실패한 왕들의 명단을 쌓아 올리며 독자에게 한 가지 질문을 남긴다. <strong>그렇다면 참 왕은 누구인가.</strong> 말라기가 끝나면 사백 년의 침묵이 흐른다. 질문은 대답 없이 공중에 걸려 있다.</p>\n<h3>신약의 책장 — 네 칸의 서가</h3>\n<p>신약 스물일곱 권의 책장은 한결 단순하다. 네 칸이면 된다. 그리고 이 네 칸은 남은 세 장면과 거의 정확하게 포개진다.</p>\n<p><strong>복음서 네 권 — 장면 5, 왕이 오시다.</strong> 마태·마가·누가·요한은 같은 한 분을 네 자리에서 증언한 기록이다. 마태는 다윗의 자손, 약속된 왕을 그리고, 마가는 섬기러 오신 종을, 누가는 잃은 자를 찾아오신 온 인류의 구주를, 요한은 육신이 되신 하나님을 그린다. 한 왕의 초상화 넉 점. 구약이 사백 년 동안 공중에 걸어 둔 질문에, 네 권이 입을 모아 대답한다.</p>\n<p><strong>역사서 한 권, 사도행전 — 장면 6이 시작되다.</strong> 부활하신 왕이 하늘 보좌에 오르시고, 성령이 내려오시고, 다시 자녀가 된 사람들의 공동체가 예루살렘에서 땅끝을 향해 번져 나간다. 왕의 대사들이 파송되는 기록이다.</p>\n<p><strong>서신서 스물한 권 — 장면 6이 깊어지다.</strong> 바울의 편지 열세 통과 여러 사도의 편지 여덟 통. 내용은 다양하지만 큰 질문은 하나로 모인다. <strong>다시 자녀가 된 사람은 어떻게 자녀답게 사는가.</strong> 고아처럼 두려워하며 살던 습관을 벗고, 양자의 영을 받은 상속자로 서고, 교회라는 새 가족 안에서 서로를 견디고 사랑하는 법. 서신서는 아버지의 집에 막 돌아온 자녀들을 위한 생활 안내서다.</p>\n<p><strong>요한계시록 한 권 — 장면 7, 왕이 다시 오시다.</strong> 마지막 책은 마지막 장면이다. 만왕의 왕이 다스리시고, 고아 이야기와 왕자 이야기가 나란히 완결되는 곳.</p>\n<p>여기서 한 가지를 눈치챌 필요가 있다. 신약의 시간은 세 토막이다. 예수님의 시대(복음서), 교회의 시대(사도행전과 서신서), 그리고 완성(계시록). <strong>이 책을 읽는 우리는 두 번째와 세 번째 사이, 곧 장면 6과 장면 7 사이에 서 있다.</strong> 성경의 지도는 과거의 유물이 아니라 우리의 현재 위치가 찍혀 있는 지도다.</p>\n<h3>한 장의 지도</h3>\n<p>이제 일곱 장면과 예순여섯 권을 한 장에 겹쳐 놓는다.</p>\n<div class=\"table-wrap\"><table><thead><tr><th>장면</th><th>이야기</th><th>성경의 자리</th></tr></thead><tbody><tr><td>1. 창조</td><td>왕의 세계, 왕자의 임명</td><td>창세기 1~2장</td></tr><tr><td>2. 반역</td><td>왕좌를 넘본 왕자, 고아가 되다</td><td>창세기 3~11장</td></tr><tr><td>3. 우상</td><td>터진 웅덩이를 파는 사람들</td><td>사사기·열왕기의 굴레, 예언서의 고발 — 전 시대를 흐르는 검은 실</td></tr><tr><td>4. 언약</td><td>포기하지 않는 아버지</td><td>창세기 12장~말라기 — 족장·모세·왕정·포로를 관통하는 금실</td></tr><tr><td>5. 성육신과 십자가</td><td>참 아들이 오시다</td><td>복음서 네 권</td></tr><tr><td>6. 부활과 교회</td><td>고아가 자녀가 되다</td><td>사도행전과 서신서 스물한 권</td></tr><tr><td>7. 완성</td><td>다시 다스리는 자녀들</td><td>요한계시록</td></tr></tbody></table></div>\n<p>이렇게 놓고 보면 성경 전체가 두 문장으로 다시 접힌다. 구약은 왕을 기다리는 이야기이고, 신약은 그 왕이 오신 이야기다. 구약 서른아홉 권은 저마다의 자리에서 한 방향을 가리키는 이정표들이고, 신약 스물일곱 권은 그 길 끝에서 만난 분에 대한 증언과, 그분의 집에서 사는 법과, 그분이 완성하실 끝에 대한 기록이다.</p>\n<p>형태가 섰다. 큰 덩어리를 잡았고(스케치), 두 쪽으로 나누었고(밑그림), 일곱 장면으로 윤곽을 그었고(윤곽선), 이제 그 장면들이 예순여섯 권의 책장 위 제자리에 앉았다(형태). 남은 일은 색을 입히는 것이다.</p>"}, {"id": "ep5", "label": "제5화", "title": "채색 I — 구약, 왕을 기다리는 이야기", "mins": 13, "html": "<p>형태 위에 이제 색을 입힌다. 채색은 서두르지 않는 작업이다. 여섯 시대를 창조시대부터 차례로 걸으며, 시대마다 같은 두 가지 질문을 들고 갈 것이다. 자녀는 무엇을 했는가. 그리고 아버지는 무엇을 하셨는가. 4부에서 손에 쥔 두 가닥의 실 — 언약의 금실과 우상의 검은 실 — 을 놓치지 않으면, 서른아홉 권은 뿔뿔이 흩어진 책 더미가 아니라 한 폭의 그림으로 모인다.</p>\n<h3>창조시대 — 번지는 죄, 그보다 깊이 흐르는 은혜</h3>\n<p>창세기 3장에서 11장까지는 반역이 어디까지 번지는지를 보여 주는 지도다. 동산에서는 부부가 서로에게 책임을 미루고, 들에서는 형이 아우를 죽이고, 몇 장 뒤에는 온 세상이 젖어 있다. \"그의 마음으로 생각하는 모든 계획이 항상 악할 뿐임을 보시고\"<span class=\"vref\">(창 6:5)</span>. 그리고 홍수가 지나간 평원 위에 인류는 다시 탑을 쌓는다. \"우리 이름을 내고\"<span class=\"vref\">(창 11:4)</span>. 왕좌를 향해 뻗었던 그 손이, 이번에는 하늘에 닿는 탑을 쌓는 것이다. 반역은 개인의 사건에서 가정의 사건으로, 사회의 사건으로, 문명의 사건으로 자란다.</p>\n<p>그런데 이 어두운 지도를 자세히 보면, 심판이 선고되는 자리마다 이상한 표가 하나씩 찍혀 있다. 동산에서 쫓겨나는 반역자들에게 하나님은 가죽옷을 지어 입히셨다<span class=\"vref\">(창 3:21)</span>. 살인자 가인에게는 그를 보호하는 표를 주셨다<span class=\"vref\">(창 4:15)</span>. 홍수 앞에는 방주가 있었고, 홍수 뒤에는 구름 속의 무지개가 걸렸다<span class=\"vref\">(창 9:13)</span>. 심판은 한 번도 마침표인 적이 없다. 언제나 쉼표였다. 그리고 바벨에서 흩어진 민족들의 긴 족보는, 마지막에 이르러 한 사람의 이름 앞에서 멈춘다. 죄가 번지는 속도보다 은혜가 달리는 속도가 늘 조금씩 빨랐다.</p>\n<h3>족장시대 — 온 세상을 되찾기 위한 한 가정</h3>\n<p>바벨에서 인류는 스스로 이름을 내려 했다. 그 직후 하나님은 아브라함 한 사람에게 정반대의 말씀을 건네신다. \"내가... 네 이름을 창대하게 하리니\"<span class=\"vref\">(창 12:2)</span>. 네가 움켜쥐려던 것을 내가 주겠다는 것이다. 그리고 그 부르심의 끝은 한 사람의 영달이 아니었다. \"땅의 모든 족속이 너로 말미암아 복을 얻을 것이라\"<span class=\"vref\">(창 12:3)</span>. 온 세상을 되찾으시려는 아버지의 전략은 뜻밖에도 작게 시작된다. 한 사람, 한 가정부터.</p>\n<p>이 시대의 가장 이상한 밤은 창세기 15장에 있다. 고대의 언약 체결식에서는 짐승을 쪼개 놓고 두 당사자가 그 사이를 지나며 맹세했다. 내가 이 언약을 어기면 이 짐승처럼 되리라. 그런데 그 밤, 아브라함은 깊은 잠에 빠져 있고 타는 횃불이 홀로 쪼갠 고기 사이를 지나간다<span class=\"vref\">(창 15:17)</span>. 하나님이 언약의 두 몫을 모두 자신이 지신 것이다. 사람이 언약을 깨뜨릴 때 그 저주까지 내가 받겠다는 뜻이다. 이 밤이 무엇을 예고하는지, 우리는 이미 장면 5에서 보았다.</p>\n<p>모리아산에서 그 예고는 한 번 더 또렷해진다. 아들을 바치라는 명령 앞에서 아브라함은 말한다. \"번제할 어린 양은 하나님이 자기를 위하여 친히 준비하시리라\"<span class=\"vref\">(창 22:8)</span>. 그날 이삭 대신 숫양이 죽었다. 먼 훗날, 또 다른 아버지의 아들에게는 대신할 숫양이 없었다.</p>\n<p>이후의 족장들은 흠 없는 위인들이 아니다. 야곱은 형과 아버지를 속인 자였고, 요셉의 형들은 동생을 팔아넘겼다. 그러나 은혜는 자격 없는 자들을 통과해 흐르고, 요셉은 그 모든 세월의 결론을 이렇게 내린다. \"당신들은 나를 해하려 하였으나 하나님은 그것을 선으로 바꾸사\"<span class=\"vref\">(창 50:20)</span>. 검은 실마저 집어 들어 금실의 무늬 속에 짜 넣으시는 솜씨 — 이것이 이 시대가 보여 주는 아버지의 손이다. 시기적으로 이 시대 사람으로 여겨지는 욥의 이야기도 같은 곳을 가리킨다. 재산과 자녀와 건강을 모두 잃고 고아처럼 부르짖던 사람이, 그 바닥에서 외친다. \"내가 알기에는 나의 대속자가 살아 계시니\"<span class=\"vref\">(욥 19:25)</span>.</p>\n<h3>모세시대 — 아들을 되찾는 전쟁, 함께 살 집</h3>\n<p>출애굽은 흔히 해방 사건으로 불리지만, 하나님이 바로에게 보내신 선전포고의 언어는 훨씬 사적이다. \"이스라엘은 내 아들 내 장자라... 내 아들을 보내 주어 나를 섬기게 하라\"<span class=\"vref\">(출 4:22-23)</span>. 출애굽은 종살이하는 아들을 되찾으러 온 아버지의 전쟁이었다.</p>\n<p>시내산에서 십계명이 주어질 때, 첫 문장을 눈여겨봐야 한다. \"나는 너를 애굽 땅, 종 되었던 집에서 인도하여 낸 네 하나님 여호와니라\"<span class=\"vref\">(출 20:2)</span>. 명령보다 구원이 먼저 온다. 율법은 구원받기 위해 오르는 사다리가 아니라, 이미 구원받은 자녀가 아버지의 집에서 사는 법이다. 이 순서가 뒤집히는 순간 성경 전체가 뒤집힌다.</p>\n<p>그러나 언약의 잉크가 마르기도 전에 검은 실이 나타난다. 모세가 산 위에 있는 동안 백성은 산 아래에서 금송아지를 부어 만들었다<span class=\"vref\">(출 32)</span>. 방금 바다를 가르신 하나님을 눈앞의 반짝이는 것과 바꾼 것이다. 장면 3에서 본 병이 언약 백성이라고 비켜 가지 않는다는 사실이 여기서 처음 드러난다.</p>\n<p>그럼에도 이 시대의 중심에는 놀라운 건축물이 서 있다. 성막이다. \"내가 그들 중에 거할 성소를 그들이 나를 위하여 짓되\"<span class=\"vref\">(출 25:8)</span>. 에덴에서 쫓겨난 이후 처음으로, 아버지가 자녀들의 진영 한가운데 장막을 치고 함께 사신다. 성막은 잃어버린 아버지의 집의 이동식 모형이었다. 레위기는 그 집 곁에서 사는 법을 가르치는 책이고 — \"너희는 거룩하라 이는 나 여호와 너희 하나님이 거룩함이니라\"<span class=\"vref\">(레 19:2)</span> — 그 복잡한 제사 제도는 하나의 문법을 몸에 새기는 교육이었다. 죄에는 생명이 값으로 요구되며, 다른 생명이 대신 그 값을 치를 수 있다는 문법. 장면 5의 어휘를, 하나님은 천 년 이상 앞서 가르치고 계셨던 것이다.</p>\n<p>민수기의 광야 사십 년은 불신이 치른 값이고, 신명기는 그 광야 끝에서 모세가 남긴 고별 설교다. 거기서 모세는 율법의 심장을 한 문장으로 요약하고 — \"너는 마음을 다하고 뜻을 다하고 힘을 다하여 네 하나님 여호와를 사랑하라\"<span class=\"vref\">(신 6:5)</span> — 동시에 문제의 뿌리가 돌판이 아니라 마음에 있음을 이미 알고 있었다. \"네 하나님 여호와께서 네 마음과 네 자손의 마음에 할례를 베푸사\"<span class=\"vref\">(신 30:6)</span>. 예레미야의 새 언약은 이 문장의 먼 메아리다.</p>\n<h3>사사시대 — 왕이 없으므로</h3>\n<p>여호수아와 함께 백성은 마침내 약속의 땅에 들어간다. 정복이 끝나고 성경은 기록한다. 여호와께서 그들의 주위에 안식을 주셨다<span class=\"vref\">(수 21:44)</span>. 에덴 이후 처음으로 안식이 돌아온 것처럼 보였다. 그러나 그것은 그림자였다. 훗날 히브리서 기자는 정확히 짚는다. \"만일 여호수아가 그들에게 안식을 주었더라면 그 후에 다른 날을 말씀하지 아니하셨으리라\"<span class=\"vref\">(히 4:8)</span>. 땅은 정복되었으나 마음은 정복되지 않았다.</p>\n<p>사사기가 그 증거다. 이 책은 같은 굴레가 도는 기록이다. 백성이 우상에게 넘어가고, 압제가 오고, 부르짖고, 하나님이 구원자를 보내시고, 평안해지면 다시 넘어간다. 굴레는 돌 때마다 조금씩 더 깊이 가라앉고, 책의 마지막 문장은 이 시대 전체의 진단서다. \"그 때에 이스라엘에 왕이 없으므로 사람이 각기 자기의 소견에 옳은 대로 행하였더라\"<span class=\"vref\">(삿 21:25)</span>. 저마다 자기 왕좌에 앉은 세상 — 장면 2가 한 사회의 규모로 재연된 것이다.</p>\n<p>그 어두운 시대의 한 귀퉁이에서 룻기가 조용히 빛난다. 모압 여인 룻을 가족으로 맞아들인 보아스는 '기업 무를 자', 곧 잃어버린 것을 값 주고 되찾아 주는 사람이었다. 구속자의 작은 초상이다. 그리고 그 가정의 족보 끝에서 한 이름이 걸어 나온다. 다윗<span class=\"vref\">(룻 4:17)</span>.</p>\n<p>백성은 마침내 왕을 요구한다. \"모든 나라와 같이 우리에게 왕을 세워\"<span class=\"vref\">(삼상 8:5)</span>. 요구 자체보다 아픈 것은 하나님의 진단이다. \"그들이 너를 버림이 아니요 나를 버려 자기들의 왕이 되지 못하게 함이니라\"<span class=\"vref\">(삼상 8:7)</span>. 겉모습으로 뽑힌 첫 왕 사울은 무너지고, 하나님은 \"내 마음에 맞는 사람\"<span class=\"vref\">(행 13:22)</span>을 찾으신다. 목동이자 시인이었던 다윗 — 시편의 절반 가까이가 그의 기도다.</p>\n<p>그리고 이 시대와 다음 시대가 만나는 이음매에서, 구약에서 가장 중요한 약속 하나가 주어진다. 다윗이 하나님께 집(성전)을 지어 드리겠다고 하자, 하나님은 그 문장을 뒤집으신다. 네가 내 집을 짓는 것이 아니라 내가 네 집을 짓겠다. \"네 집과 네 나라가 내 앞에서 영원히 보전되고 네 왕위가 영원히 견고하리라\"<span class=\"vref\">(삼하 7:16)</span>. 이날부터 언약의 금실에는 주소가 생겼다. 오실 참 왕은 다윗의 혈통에서 난다.</p>\n<h3>왕정시대 — 무너지는 왕들, 또렷해지는 왕</h3>\n<p>솔로몬은 이 이야기의 정점처럼 보였다. 지혜로 이름이 사방에 퍼지고, 성막은 마침내 돌로 지은 성전이 되고, 봉헌하는 날 영광이 그 집을 가득 채운다<span class=\"vref\">(왕상 8)</span>. 잠언과 아가가 이 궁정에서 나왔다. 그러나 바로 그 지혜의 왕이 만년에 이방 신들에게 마음을 내준다<span class=\"vref\">(왕상 11:4)</span>. 세상 모든 것을 가져 본 왕의 최종 보고서가 \"모든 것이 헛되도다\"<span class=\"vref\">(전 1:2)</span>였음을 우리는 이미 장면 3에서 읽었다.</p>\n<p>솔로몬 이후 나라는 둘로 찢어진다. 북쪽의 여로보암은 백성의 발길을 예루살렘 성전에서 돌리려고 금송아지 둘을 만드는데, 그 선전 문구가 소름 끼치도록 낯익다. \"이스라엘아 이는 너희를 애굽 땅에서 인도하여 올린 너희의 신들이라\"<span class=\"vref\">(왕상 12:28)</span>. 시내산 아래에서 들리던 말이 거의 그대로 되풀이된 것이다<span class=\"vref\">(출 32:4)</span>. 검은 실은 새로운 무늬를 만들지 않는다. 같은 무늬를 반복할 뿐이다. 갈멜산에서 엘리야가 바알과 맞서지만<span class=\"vref\">(왕상 18)</span>, 북왕국은 — 열왕기의 평가로는 — 끝내 단 한 명의 선한 왕도 내지 못한 채 앗수르에 무너진다. 남왕국 유다에는 히스기야와 요시야 같은 개혁의 왕들이 있었으나 기울어진 대세를 되돌리지 못했고, 결국 바벨론의 손에 성전이 불탄다.</p>\n<p>열왕기에는 후렴처럼 반복되는 문장이 있다. \"여호와 보시기에 악을 행하여.\" 왕들의 실패 명단이 그렇게 쌓여 가는 동안, 이상한 일이 일어난다. 예언자들의 목소리가 점점 미래형으로 바뀌는 것이다. 호세아는 배신한 아내를 다시 값 주고 사 오는 남편의 이야기로 하나님의 심정을 그리며 — \"내가 어찌 너를 놓겠느냐\"<span class=\"vref\">(호 11:8)</span> — 이스라엘을 애굽에서 불러낸 \"내 아들\"<span class=\"vref\">(호 11:1)</span>이라 부른다. 아모스는 정의를, 미가는 베들레헴에서 나실 통치자를<span class=\"vref\">(미 5:2)</span>, 이사야는 가장 멀리 본다. \"한 아기가 우리에게 났고... 그의 어깨에는 정사를 메었고\"<span class=\"vref\">(사 9:6)</span>. 그리고 그 왕이 뜻밖의 방식으로 이기리라는 것까지. \"그가 찔림은 우리의 허물 때문이요\"<span class=\"vref\">(사 53:5)</span>. 현재의 왕들이 어두워질수록, 오실 왕의 초상은 밝아진다. 왕정시대의 역설이다.</p>\n<h3>포로·귀환시대 — 바닥에서 태어나는 소망</h3>\n<p>\"우리가 바벨론의 여러 강변 거기에 앉아서 시온을 기억하며 울었도다\"<span class=\"vref\">(시 137:1)</span>. 땅을 잃고, 성전을 잃고, 왕좌를 잃었다. 언약의 눈에 보이는 증표가 전부 사라진 것이다. 반역자가 고아가 되던 장면 2를, 이번에는 한 민족 전체가 제 운명으로 살아 냈다.</p>\n<p>그런데 구약에서 가장 대담한 소망은 바로 이 바닥에서 태어난다. 에스겔은 마른 뼈들이 살아나 큰 군대가 되는 환상을 보고<span class=\"vref\">(겔 37)</span>, 하나님의 수술 계획을 전한다. \"새 영을 너희 속에 두고... 너희 육신에서 굳은 마음을 제거하고 부드러운 마음을 줄 것이며\"<span class=\"vref\">(겔 36:26)</span>. 다니엘은 제국들이 일어섰다 스러지는 환상의 끝에서 \"인자 같은 이\"가 영원히 멸망하지 않을 나라를 받는 것을 본다<span class=\"vref\">(단 7:13-14)</span>. 지상의 왕좌를 잃은 백성에게, 하늘은 결코 무너지지 않을 왕좌를 보여 준 것이다.</p>\n<p>이윽고 귀환이 온다. 에스라와 함께 성전이, 느헤미야와 함께 성벽이 다시 서고, 학개와 스가랴가 지친 손들을 격려한다. 페르시아 궁정에서는 에스더가 — 하나님의 이름이 한 번도 등장하지 않는 그 책에서 — 숨어 일하시는 섭리의 손을 보여 준다. 역대기는 돌아온 세대에게 다윗 언약을 다시 들려주는 긴 회고다. 잊지 마라, 약속은 아직 살아 있다.</p>\n<p>그러나 돌아와 보니 모든 것이 예언의 영광에 못 미쳤다. 새 성전의 기초가 놓이던 날 옛 성전을 본 노인들은 통곡했고<span class=\"vref\">(스 3:12)</span>, 학개는 물어야 했다. \"이 성전의 이전 영광을 본 자가 누구냐 이제 이것이 너희에게 어떻게 보이느냐\"<span class=\"vref\">(학 2:3)</span>. 왕좌에는 여전히 다윗의 자손이 아니라 페르시아 왕이 앉아 있었다. 말라기 시대의 백성은 지쳐서 되묻는 지경에 이른다. \"주께서 어떻게 우리를 사랑하셨나이까\"<span class=\"vref\">(말 1:2)</span>. 그 물음에 대한 하나님의 대답이 구약의 마지막 예언이다. \"보라 내가 내 사자를 보내리니 그가 내 앞에서 길을 준비할 것이요\"<span class=\"vref\">(말 3:1)</span>.</p>\n<p>그리고 구약 전체의 마지막 문장을 보라. 엘리야를 보내리니 그가 \"아버지의 마음을 자녀에게로 돌이키게 하고 자녀들의 마음을 그들의 아버지에게로 돌이키게 하리라\"<span class=\"vref\">(말 4:6)</span>. 서른아홉 권의 마지막 단어들이 하필 아버지와 자녀다. 이 긴 책이 처음부터 무슨 이야기였는지, 성경이 스스로 마지막 줄에 서명해 둔 셈이다.</p>\n<h3>사백 년의 침묵, 켜져 있는 등불</h3>\n<p>말라기가 덮이고 사백 년 동안 예언자의 목소리가 끊긴다. 그러나 침묵은 포기가 아니었다. 이 시점에서 이스라엘의 손에 들려 있던 약속들을 세어 보라. 뱀의 머리를 상하게 할 여자의 후손<span class=\"vref\">(창 3:15)</span>, 땅의 모든 족속에게 미칠 아브라함의 복<span class=\"vref\">(창 12:3)</span>, 영원히 견고할 다윗의 왕위<span class=\"vref\">(삼하 7:16)</span>, 베들레헴에서 나실 통치자<span class=\"vref\">(미 5:2)</span>, 마음에 새겨질 새 언약<span class=\"vref\">(렘 31:33)</span>, 왕의 길을 준비할 사자<span class=\"vref\">(말 3:1)</span>. 방향이 다른 이정표는 하나도 없다. 전부 한 사람을 가리키고 있다.</p>\n<p>그리고 사백 년의 침묵이 깨지는 첫 문장은 이렇게 시작된다. \"아브라함과 다윗의 자손 예수 그리스도의 계보라\"<span class=\"vref\">(마 1:1)</span>. 구약이 언약을 맡겼던 두 사람의 이름을 수신인처럼 앞세우고, 신약이 열리는 것이다.</p>"}, {"id": "ep6", "label": "제6화", "title": "채색 II — 신약, 그 왕이 오신 이야기", "mins": 10, "html": "<p>이제 신약에 색을 입힌다. 3부에서 우리는 성육신과 십자가, 부활과 교회, 완성이라는 사건들을 이미 보았다. 그러니 여기서는 사건을 다시 말하는 대신, 그 사건을 기록한 스물일곱 권의 책장을 걷는다. 질문도 하나 바뀐다. 구약을 걷는 동안의 질문이 \"그 왕은 누구인가\"였다면, 신약의 네 칸은 각각 이렇게 묻고 답한다. 왕은 누구인가(복음서), 왕의 소식은 어디까지 갔는가(사도행전), 왕의 자녀는 어떻게 사는가(서신서), 그리고 이 모든 것의 끝은 무엇인가(계시록).</p>\n<h3>복음서 — 한 왕의 초상화 넉 점</h3>\n<p>마태복음은 계보로 시작한다. 현대 독자에게는 지루한 명단이지만, 구약을 걸어온 독자에게 그것은 수령증이다. 아브라함에게 맡겨진 약속과 다윗에게 맡겨진 약속이, 이 아기에게서 수령되었다는 확인 서명. 그래서 마태의 예수는 처음부터 왕이다. 동방의 박사들이 와서 묻는다. \"유대인의 왕으로 나신 이가 어디 계시냐\"<span class=\"vref\">(마 2:2)</span>. 이 칭호가 어디서 다시 나타나는지 우리는 안다. 십자가의 명패다. 마태의 예수는 나실 때와 죽으실 때 같은 이름으로 불린 왕이었고, 그 사이에서 산 위에 앉아 나라의 헌법을 선포하셨다<span class=\"vref\">(마 5~7장)</span>.</p>\n<p>마가복음은 가장 짧고 가장 급하다. 그리고 이 책의 심장에는 왕에 대한 우리의 모든 상식을 뒤집는 한 문장이 박혀 있다. \"인자가 온 것은 섬김을 받으려 함이 아니라 도리어 섬기려 하고 자기 목숨을 많은 사람의 대속물로 주려 함이니라\"<span class=\"vref\">(막 10:45)</span>. 대속물 — 레위기가 천 년 넘게 가르쳐 온 바로 그 문법이다. 다른 생명이 대신 값을 치른다는 문법의 최종 문장이 여기서 완성된다. 값을 치르는 생명이 짐승이 아니라 왕 자신이라는 것.</p>\n<p>누가복음의 예수는 잃은 것을 찾으러 다니시는 분이다. \"인자가 온 것은 잃어버린 자를 찾아 구원하려 함이니라\"<span class=\"vref\">(눅 19:10)</span>. 그리고 누가복음 15장에는 이 책 전체가 사실상 하나의 비유 안에 들어 있다. 아버지의 재산을 미리 받아 먼 나라로 떠난 아들 — 스스로 고아의 길을 걸어 나간 자다. 모든 것을 잃고 돌아오면서 그가 준비한 대사는 정확히 고아의 문장이다. \"지금부터는 아버지의 아들이라 일컬음을 감당하지 못하겠나이다 나를 품꾼의 하나로 보소서\"<span class=\"vref\">(눅 15:19)</span>. 그러나 아버지는 그 대사를 끝까지 듣지도 않는다. \"아직도 거리가 먼데 아버지가 그를 보고 측은히 여겨 달려가 목을 안고 입을 맞추니\"<span class=\"vref\">(눅 15:20)</span>. 그리고 제일 좋은 옷과 가락지와 신을 내오게 하며 선언한다. \"이 내 아들은 죽었다가 다시 살아났으며\"<span class=\"vref\">(눅 15:24)</span>. 품꾼이 되겠다는 자를 아들로 복권시키는 아버지 — 창세기 3장에서 시작된 이야기가 어떻게 끝나기를 하나님이 원하시는지, 예수께서 직접 그려 주신 그림이다.</p>\n<p>요한복음은 가장 높은 곳에서 시작한다. \"태초에 말씀이 계시니라\"<span class=\"vref\">(요 1:1)</span>. 창세기의 첫 구절을 일부러 되울리는 문장이다. 그리고 우리가 장면 5에서 읽었던 \"말씀이 육신이 되어 우리 가운데 거하시매\"<span class=\"vref\">(요 1:14)</span>에서, '거하시매'로 번역된 말의 원뜻은 '장막을 치셨다'이다. 광야에서 자녀들 한가운데 세워졌던 성막 — 그 이동식 모형이 마침내 실물로 온 것이다. 이제 하나님의 거처는 천막도 건물도 아니고, 한 사람이다.</p>\n<p>넉 점의 초상화는 각도가 다르지만 모두 같은 지점에서 느려진다. 네 권 모두 분량의 상당 부분을 마지막 한 주간에 쏟아붓는다. 복음서는 전기가 아니라, 긴 서문이 달린 수난과 부활의 기록이다. 왕의 초상화에서 가장 공들여 그려진 부분이 왕관이 아니라 상처라는 것 — 이것이 복음서라는 장르의 본질이다.</p>\n<h3>사도행전 — 반역자가 대사가 되다</h3>\n<p>사도행전의 목차는 첫 장에 미리 적혀 있다. \"예루살렘과 온 유대와 사마리아와 땅 끝까지 이르러 내 증인이 되리라\"<span class=\"vref\">(행 1:8)</span>. 그대로 된다. 이 책은 그 세 단계의 동심원이 퍼져 나가는 기록이다.</p>\n<p>출발점은 오순절이다. 성령이 기도하던 무리 위에 임하시고<span class=\"vref\">(행 2)</span>, 이로써 긴 이주의 역사가 완성된다. 하나님의 임재는 에덴의 동산에서, 광야의 성막으로, 예루살렘의 성전으로 옮겨 왔다. 그리고 이제 마지막 이사를 하신다. 사람 안으로. 돌판이 아니라 마음에 새기겠다던 새 언약<span class=\"vref\">(렘 31:33)</span>, 굳은 마음을 제거하고 새 영을 두겠다던 약속<span class=\"vref\">(겔 36:26)</span>이 이 아침에 현실이 된다. 교회는 건물이 생기기 전에, 하나님이 거하시는 사람들로 먼저 태어났다.</p>\n<p>동심원은 경계를 넘을 때마다 논란을 일으킨다. 사마리아인에게, 이방인 고넬료에게<span class=\"vref\">(행 10)</span> 복음이 건너갈 때마다 교회는 진통을 겪는다. 그러나 이 확장은 일탈이 아니라 설계였다. 땅의 모든 족속이 복을 얻으리라던 아브라함의 언약<span class=\"vref\">(창 12:3)</span>이 드디어 국경을 넘기 시작한 것이다.</p>\n<p>그리고 이 책의 한복판에서 하나님은 가장 뜻밖의 사람을 뽑아 드신다. 교회를 잡아 가두던 사울, 스스로 훗날 \"죄인 중에 내가 괴수니라\"<span class=\"vref\">(딤전 1:15)</span> 고백한 사람이다. 반역자 중의 반역자가 다메섹 길에서 왕을 만나고<span class=\"vref\">(행 9)</span>, 왕의 대사가 된다. 바라바의 자리에서 우리가 본 그 은혜의 문법이 여기서 반복된다. 이 이야기의 하나님은 반역의 경력이 가장 화려한 자를 골라 가장 먼 곳까지 보내시는 분이다. 책은 그 대사가 제국의 수도 로마에서 담대하게 하나님 나라를 전하는 장면에서, 일부러 끝맺지 않은 듯한 모양으로 끝난다. 동심원은 아직 퍼지는 중이라는 뜻이다.</p>\n<h3>서신서 — 자녀로 사는 법을 배우다</h3>\n<p>스물한 통의 편지는 다양한 도시의 다양한 문제를 다루지만, 큰 질문은 하나로 모인다. 다시 자녀가 된 사람은 어떻게 자녀답게 사는가.</p>\n<p>바울의 편지들에는 공통된 뼈대가 있다. 앞부분은 하나님이 하신 일이고, 뒷부분이 우리가 할 일이다. 에베소서가 전형이다. 세 장에 걸쳐 은혜를 쌓아 올린 뒤에야 비로소 첫 명령이 나온다. \"부르심을 받은 일에 합당하게 행하여\"<span class=\"vref\">(엡 4:1)</span>. 이 순서가 낯익지 않은가. \"나는 너를 애굽 땅, 종 되었던 집에서 인도하여 낸 네 하나님 여호와니라\" 다음에야 십계명이 왔다<span class=\"vref\">(출 20:2)</span>. 시내산에서나 서신서에서나 문법은 같다. 구원이 먼저고, 삶은 그 응답이다. 로마서는 그 복음의 논리를 가장 치밀하게 정리한 편지다. \"모든 사람이 죄를 범하였으매\"<span class=\"vref\">(롬 3:23)</span>에서 시작해, 믿음으로 의롭게 되고, 양자의 영을 받아 \"아빠 아버지\"라 부르짖는 데까지<span class=\"vref\">(롬 8:15)</span>.</p>\n<p>한편 검은 실은 신약이라고 끊기지 않는다. 다만 이름이 정교해진다. \"탐심은 우상 숭배니라\"<span class=\"vref\">(골 3:5)</span>. 금송아지는 이제 마음속에 세워진다는 것을 서신서는 안다. 그래서 요한의 첫째 편지가 무슨 문장으로 끝나는지 눈여겨보라. \"자녀들아 너희 자신을 지켜 우상에게서 멀리하라\"<span class=\"vref\">(요일 5:21)</span>. 구약이 아버지와 자녀로 끝났듯, 사랑을 가장 깊이 노래한 이 편지는 우상 경고로 끝난다. 두 실은 마지막 페이지까지 나란히 달린다.</p>\n<p>일반서신들은 저마다의 자리에서 이 삶을 거든다. 야고보는 행함 없는 믿음의 공허를 찌르고, 베드로는 고난받는 나그네들에게 \"산 소망\"<span class=\"vref\">(벧전 1:3)</span>을 말하며 그들의 정체를 이렇게 선언한다. \"너희는 택하신 족속이요 왕 같은 제사장들이요\"<span class=\"vref\">(벧전 2:9)</span>. 시내산에서 이스라엘에게 주어졌던 그 소명<span class=\"vref\">(출 19:6)</span>이, 이제 모든 민족에서 모인 자녀들의 이름표가 된 것이다. 그리고 히브리서는 구약 전체를 한 손에 들고 말한다. 성막도, 제사도, 여호수아의 안식도 모두 그림자였고 실물은 그리스도라고. 그러므로 \"안식할 때가 하나님의 백성에게 남아 있도다\"<span class=\"vref\">(히 4:9)</span>. 에덴에서 잃어버린 그 쉼이, 아직 우리 앞에 예약되어 있다는 것이다.</p>\n<p>서신서를 읽는 것은 아버지의 집에 막 돌아온 자녀들의 성장 앨범을 넘기는 일이다. 다투고, 흔들리고, 옛 습관으로 미끄러지는 교회들 — 완성된 공동체는 한 곳도 없다. 그러나 바로 그 미완성이 위로다. 편지마다 결론은 같다. 너희가 이미 누구인지를 기억하라. 그리고 그 사람답게 되어 가라.</p>\n<h3>요한계시록 — 어린 양이 다스리신다</h3>\n<p>마지막 책은 승리의 나팔이 아니라 눈물 속에서 쓰였다. 황제 숭배를 강요받고 순교자를 내던 박해기의 교회에게 보낸 편지다. 그들의 질문은 우리 것과 같다. 왕이 이기셨다면, 왜 세상은 아직 이 모양인가.</p>\n<p>계시록의 대답은 하늘 보좌의 방을 열어 보이는 것이다<span class=\"vref\">(계 4~5장)</span>. 역사의 중심에 무엇이 있는가. 황제의 옥좌가 아니라 보좌이고, 그 보좌 곁에 서 있는 것은 사자가 아니라 \"죽임을 당한 것 같은\" 어린 양이다<span class=\"vref\">(계 5:6)</span>. 우주의 중심에 십자가의 상처를 지닌 왕이 계시다는 것 — 이것이 박해받는 자녀들에게 주신 첫 번째 위로다. 그리고 그 왕의 옷자락에는 마침내 온전한 이름이 적힌다. \"만왕의 왕이요 만주의 주\"<span class=\"vref\">(계 19:16)</span>.</p>\n<p>이 책에서 검은 실도 최후를 맞는다. 계시록은 우상의 제국을 '바벨론'이라 부른다. 창세기 11장의 평원에서 쌓이기 시작한 그 탑, 스스로 이름을 내려던 문명 전체의 이름이다. 그 바벨론이 무너진다<span class=\"vref\">(계 18)</span>. 터진 웅덩이의 역사가 끝나는 것이다.</p>\n<p>그리고 우리가 장면 7에서 본 결말이 온다. 새 하늘과 새 땅. 다만 채색하며 지나가는 이 걸음에서 하나만 더 눈에 담자. 마지막 두 장은 에덴의 회복이되, 단순한 복귀가 아니다. 동산은 도성이 되었고, 생명나무가 다시 서 있으며<span class=\"vref\">(계 22:2)</span>, \"다시 저주가 없으며\"<span class=\"vref\">(계 22:3)</span>. 처음보다 좋은 끝 — 잃었던 것을 되찾는 정도가 아니라, 잃기 전보다 더 깊이 받는 것이 이 아버지의 방식이다.</p>\n<p>성경의 마지막 문장들이 무엇인지 아는가. 명령도 교리도 아니다. 기도다. \"아멘 주 예수여 오시옵소서\"<span class=\"vref\">(계 22:20)</span>. 구약이 기다림으로 끝났듯, 신약도 기다림으로 끝난다. 다만 이제는 누구를 기다리는지 이름을 안다. 그리고 그 기도는 우리가 서 있는 자리 — 장면 6과 장면 7 사이 — 에서 지금도 드려지고 있다.</p>\n<h3>두 개의 기다림</h3>\n<p>이렇게 그림에 색이 다 입혀졌다. 구약 서른아홉 권은 오실 왕을 기다렸고, 신약 스물일곱 권은 오신 왕을 증언하며 다시 오실 왕을 기다린다. 성경은 처음부터 끝까지 기다림의 책이지만, 그 기다림은 막연한 소망이 아니다. 첫 번째 기다림이 마구간에서 정확히 응답되었기에, 두 번째 기다림은 확신이 된다. 약속을 지키신 분이 마지막 약속만 어기실 리 없기 때문이다.</p>"}, {"id": "ep7", "label": "제7화", "title": "마지막 붓질 — 예순여섯 권, 한 권씩", "mins": 10, "html": "<p>그림은 완성되었다. 남은 것은 세부다. 화가는 마지막에 가장 가는 붓을 들어, 멀리서는 보이지 않던 작은 획들을 하나씩 살려 낸다. 이제 책장 앞에 서서 예순여섯 권을 한 권씩 꺼내 들자. 긴 해설은 하지 않는다. 각 책이 이 큰 그림의 어느 자리에서 어떤 색을 내는지, 한두 획씩만 긋는다. 언젠가 성경의 어느 책을 펼치든, 이 페이지로 돌아와 지금 어디에 서 있는지 확인할 수 있도록.</p>\n<h3>구약 첫째 칸 — 이야기의 등뼈, 역사서 열일곱 권</h3>\n<p>앞의 다섯 권은 모세오경이라 불리는 이야기의 주춧돌이다.</p>\n<p><strong>창세기</strong> — 시작. 왕의 세계와 왕자의 임명, 반역과 추방, 그리고 한 가정에 심긴 금실까지 — 성경의 모든 주제가 씨앗으로 들어 있는 책.</p>\n<p><strong>출애굽기</strong> — 구원. 종이 된 아들을 되찾으러 온 아버지의 전쟁. 홍해가 시내산보다 먼저라는 문법이 여기서 세워진다.</p>\n<p><strong>레위기</strong> — 거룩. 거룩하신 분 곁에서 사는 법. 피와 제사의 언어로 대속의 문법을 천 년 앞서 가르치는 교과서.</p>\n<p><strong>민수기</strong> — 광야. 불신이 한 세대를 걸러 낸 사십 년. 그러나 그 광야에서도 구름 기둥은 진영을 떠나지 않았다.</p>\n<p><strong>신명기</strong> — 언약 갱신. 약속의 땅 문턱에서 다시 듣는 언약. 율법의 심장이 사랑임을<span class=\"vref\">(신 6:5)</span> 모세가 마지막 숨으로 새긴 책.</p>\n<p><strong>여호수아</strong> — 정복. 약속이 마침내 땅이 되다. 그러나 그 안식은 그림자였고, 참 안식은 아직 남아 있었다.</p>\n<p><strong>사사기</strong> — 굴레. 왕이 없으므로 각자 자기 소견의 왕좌에 앉은 시대. 나선형으로 가라앉는 반복의 기록.</p>\n<p><strong>룻기</strong> — 신실. 어둠의 시대 한 귀퉁이에서 기업 무를 자가 이방 여인을 가족으로 들이다. 그 족보의 끝에 다윗이 서 있다.</p>\n<p><strong>사무엘상</strong> — 왕정의 시작. \"나를 버려 자기들의 왕이 되지 못하게 함이니라\"<span class=\"vref\">(삼상 8:7)</span>. 겉모습의 왕이 지고, 마음의 사람이 떠오른다.</p>\n<p><strong>사무엘하</strong> — 다윗. 그의 영광과 추락, 그리고 그 모든 것보다 큰 약속 — 영원한 왕위. 금실에 주소가 새겨진 책.</p>\n<p><strong>열왕기상</strong> — 정점과 분열. 성전에 영광이 가득 찼으나, 지혜의 왕이 우상에 마음을 내주며 내리막이 시작된다.</p>\n<p><strong>열왕기하</strong> — 몰락. \"여호와 보시기에 악을 행하여\"의 긴 명단. 북은 앗수르에, 남은 바벨론에. 실패한 왕들의 책이 참 왕을 부른다.</p>\n<p><strong>역대상</strong> — 회고. 같은 역사를 성전과 다윗 언약의 각도에서 다시 쓰다. 돌아온 포로들에게 건네는 말: 약속은 살아 있다.</p>\n<p><strong>역대하</strong> — 성전의 일대기. 봉헌의 영광에서 소각의 잿더미까지. 그러나 마지막 문장은 귀환의 조서다 — 이 역사는 심판으로 끝나지 않는다.</p>\n<p><strong>에스라</strong> — 재건. 무너진 성전을 다시 세우다. 회복의 첫 단추는 예배였다.</p>\n<p><strong>느헤미야</strong> — 성벽. 기도하는 손과 흙을 나르는 손이 같은 손임을 보여 준 재건의 기록.</p>\n<p><strong>에스더</strong> — 섭리. 하나님의 이름이 한 번도 나오지 않는 책. 그러나 모든 장면의 뒤편에서 일하시는 손은 한순간도 쉬지 않는다.</p>\n<h3>구약 둘째 칸 — 무대 위의 독백, 시가서 다섯 권</h3>\n<p><strong>욥기</strong> — 고난. 왜 의인이 고통받는가. 대답 대신 폭풍 속에서 얼굴을 보여 주시는 하나님, 그리고 재 가운데서 터져 나온 고백 — \"나의 대속자가 살아 계시니\"<span class=\"vref\">(욥 19:25)</span>.</p>\n<p><strong>시편</strong> — 기도. 백오십 편의 노래. 환호에서 절규까지, 자녀가 아버지 앞에서 쓸 수 있는 모든 언어를 모은 사전.</p>\n<p><strong>잠언</strong> — 지혜. 아버지가 아들에게 건네는 삶의 기술. 그 첫 문장은 여호와를 경외하는 것이 지식의 근본이라는 것.</p>\n<p><strong>전도서</strong> — 헛됨. 다 가져 본 왕의 최종 보고서. 해 아래의 모든 웅덩이는 터져 있다 — 장면 3의 실험 증명서.</p>\n<p><strong>아가</strong> — 사랑. 부끄러움 없이 서로를 기뻐하는 신랑과 신부의 노래. 에덴에서 잃었던 것이며, 어린 양의 혼인 잔치에서 온전히 되찾을 것.</p>\n<h3>구약 셋째 칸 — 무대 밖의 음성, 예언서 열일곱 권</h3>\n<p>먼저 다섯 권의 큰 책, 대선지서다.</p>\n<p><strong>이사야</strong> — 예언서의 산맥. 한 아기(9장)와 고난받는 종(53장) — 오실 왕의 초상을 가장 멀리, 가장 자세히 그린 책.</p>\n<p><strong>예레미야</strong> — 눈물. 무너지는 나라 앞에서 울던 예언자가, 심판의 한복판에서 새 언약을 받아 적는다. 돌판이 아니라 마음에.</p>\n<p><strong>예레미야애가</strong> — 애통. 불탄 예루살렘 앞에서 부른 장송곡. 그러나 그 잿더미 한가운데 이런 문장이 있다. \"여호와의 인자와 긍휼이 무궁하시므로\"<span class=\"vref\">(애 3:22)</span>.</p>\n<p><strong>에스겔</strong> — 환상. 마른 뼈가 살아나 큰 군대가 되고, 떠났던 영광이 돌아온다. 새 영과 새 마음의 약속.</p>\n<p><strong>다니엘</strong> — 주권. 제국들이 일어섰다 스러지는 위에 앉으신 하나님. 인자 같은 이에게 주어지는, 멸망하지 않는 나라.</p>\n<p>이어서 열두 권의 작은 책, 소선지서다. 작다는 것은 분량이지 무게가 아니다.</p>\n<p><strong>호세아</strong> — 아픈 사랑. 배신한 아내를 다시 값 주고 사 오는 남편. 하나님이 자기 심정을 그린 가장 아픈 자화상.</p>\n<p><strong>요엘</strong> — 여호와의 날. 메뚜기 재앙 너머의 심판과 회복. \"내 영을 만민에게 부어 주리니\"<span class=\"vref\">(욜 2:28)</span> — 오순절이 여기서 예고되었다.</p>\n<p><strong>아모스</strong> — 정의. 예배와 삶이 갈라진 종교를 향한 고발. 정의를 물같이, 공의를 마르지 않는 강같이.</p>\n<p><strong>오바댜</strong> — 경고. 구약에서 가장 짧은 책. 형제의 몰락을 고소하게 바라본 에돔에게 내린 심판.</p>\n<p><strong>요나</strong> — 자비. 원수의 도시까지 가는 하나님의 마음. 이 책의 기적은 물고기가 아니라 니느웨를 아끼시는 그 마음이다.</p>\n<p><strong>미가</strong> — 베들레헴. 가장 작은 고을에서 나실 통치자. 그리고 하나님이 구하시는 것 — 정의, 인자, 겸손히 행함.</p>\n<p><strong>나훔</strong> — 니느웨의 끝. 요나 때 회개했던 도시가 다시 잔인해졌을 때. 자비는 회개를 잊은 자를 무한정 기다리지 않는다.</p>\n<p><strong>하박국</strong> — 질문. 왜 악인이 형통합니까. 대답을 다 듣지 못한 채 예언자는 배운다. \"의인은 그의 믿음으로 말미암아 살리라\"<span class=\"vref\">(합 2:4)</span>.</p>\n<p><strong>스바냐</strong> — 어둠과 노래. 여호와의 날의 캄캄함을 지나면 뜻밖의 문장이 기다린다. \"너로 말미암아 기쁨을 이기지 못하시며\"<span class=\"vref\">(습 3:17)</span>. 자녀 때문에 노래하시는 아버지.</p>\n<p><strong>학개</strong> — 우선순위. 초라한 새 성전 앞에서 낙심한 백성에게. 나중 영광이 이전 영광보다 크리라<span class=\"vref\">(학 2:9)</span>.</p>\n<p><strong>스가랴</strong> — 오실 왕의 환상. 공의로우며 구원을 베풀며, 겸손하여 나귀를 타시는 왕<span class=\"vref\">(슥 9:9)</span>.</p>\n<p><strong>말라기</strong> — 마지막 물음. 지친 백성의 \"어떻게 우리를 사랑하셨나이까\"<span class=\"vref\">(말 1:2)</span>와 길 준비할 사자의 약속. 구약의 마지막 단어는 아버지와 자녀다.</p>\n<h3>신약 첫째 칸 — 왕의 초상화, 복음서 네 권</h3>\n<p><strong>마태복음</strong> — 왕의 복음. 아브라함과 다윗의 약속에 대한 수령증으로 시작해, 유대인의 왕이라는 명패로 완성된다.</p>\n<p><strong>마가복음</strong> — 종의 복음. 숨 가쁘게 달리는 가장 짧은 기록. 섬기려 하고 자기 목숨을 대속물로 주려 오신 왕.</p>\n<p><strong>누가복음</strong> — 구주의 복음. 잃은 자를 찾아 구원하러 오신 분. 달려 나가는 아버지의 비유가 이 책에 있다.</p>\n<p><strong>요한복음</strong> — 말씀의 복음. 태초의 말씀이 육신이 되어 우리 가운데 장막을 치시다. 기록된 목적도 분명하다 — 믿고, 그 이름으로 생명을 얻게 하려는 것<span class=\"vref\">(요 20:31)</span>.</p>\n<h3>신약 둘째 칸 — 퍼져 나가는 소식, 사도행전</h3>\n<p><strong>사도행전</strong> — 확장. 예루살렘에서 로마까지 퍼지는 동심원. 임재의 마지막 이사(사람 안으로)와 반역자 출신 대사의 파송 기록. 닫히지 않은 결말은 이 책이 아직 쓰이는 중이라는 뜻이다.</p>\n<h3>신약 셋째 칸 — 자녀들에게 온 편지, 서신서 스물한 권</h3>\n<p>먼저 바울의 편지 열세 통이다.</p>\n<p><strong>로마서</strong> — 복음의 설계도. 모든 사람이 죄를 범하였으매에서 시작해, 양자의 영과 끊을 수 없는 사랑의 확신까지.</p>\n<p><strong>고린도전서</strong> — 문제투성이 교회에게. 분쟁과 방종의 한복판에서도 — 너희는 그리스도의 몸이며, 제일은 사랑이다(13장).</p>\n<p><strong>고린도후서</strong> — 약함의 능력. 질그릇에 담긴 보배. 내 은혜가 네게 족하도다.</p>\n<p><strong>갈라디아서</strong> — 자유. 은혜에 아무것도 보태지 말라. 네가 이 후로는 종이 아니요 아들이니<span class=\"vref\">(갈 4:7)</span>.</p>\n<p><strong>에베소서</strong> — 새 가족의 헌장. 은혜 세 장, 삶 세 장. 그리스도 안에서 유대인과 이방인이 한 집이 되다.</p>\n<p><strong>빌립보서</strong> — 기쁨. 감옥에서 쓴 가장 밝은 편지. 자기를 비워 종의 형체를 가지신 왕의 마음을 품으라<span class=\"vref\">(빌 2장)</span>.</p>\n<p><strong>골로새서</strong> — 충만. 그리스도가 전부다. 만물이 그 안에서 창조되었고 그로 말미암아 화목하게 된다.</p>\n<p><strong>데살로니가전서</strong> — 소망. 다시 오실 주를 기다리는 법 — 깨어 있되, 일상을 성실히.</p>\n<p><strong>데살로니가후서</strong> — 인내. 그날이 늦어 보여도 흔들리지 말라. 기다림은 게으름의 핑계가 아니다.</p>\n<p><strong>디모데전서</strong> — 목양. 아들 같은 젊은 목회자에게 — 하나님의 집을 어떻게 돌볼 것인가.</p>\n<p><strong>디모데후서</strong> — 유언. 순교를 앞둔 사도의 마지막 편지. 선한 싸움, 달려갈 길, 지킨 믿음.</p>\n<p><strong>디도서</strong> — 열매. 은혜는 우리를 훈련시켜 선한 일에 열심하게 한다. 교리와 행실은 한 몸이다.</p>\n<p><strong>빌레몬서</strong> — 용서. 도망친 종을 형제로 받으라. 복음이 신분의 벽을 넘는 가장 개인적인 실험.</p>\n<p>이어서 여러 사도의 편지 여덟 통, 일반서신이다.</p>\n<p><strong>히브리서</strong> — 실물. 성막도 제사도 여호수아의 안식도 그림자였다. 더 나은 대제사장, 단번에 드린 제사, 남아 있는 안식.</p>\n<p><strong>야고보서</strong> — 행함. 행함으로 숨 쉬는 믿음. 듣고 잊어버리는 자가 되지 말라.</p>\n<p><strong>베드로전서</strong> — 나그네에게. 고난받는 거류민들의 진짜 신분 — 택하신 족속, 왕 같은 제사장, 산 소망의 상속자.</p>\n<p><strong>베드로후서</strong> — 오래 참으심. 주의 약속은 더딘 것이 아니라, 아무도 멸망하지 않기를 원하시는 기다림이다<span class=\"vref\">(벧후 3:9)</span>.</p>\n<p><strong>요한일서</strong> — 사랑. 하나님은 사랑이시라. 그리고 그 편지의 마지막 문장은 우상 경고다 — 두 실은 끝까지 나란히 달린다.</p>\n<p><strong>요한이서</strong> — 진리와 사랑. 가장 짧은 편지들의 첫째. 진리 안에서 사랑하라.</p>\n<p><strong>요한삼서</strong> — 환대. 진리를 위해 길 떠난 사람들을 영접하는 자는 진리의 동역자다.</p>\n<p><strong>유다서</strong> — 수호. 성도에게 단번에 주신 믿음을 위해 힘써 싸우라.</p>\n<h3>신약 넷째 칸 — 그림의 마지막 획, 요한계시록</h3>\n<p><strong>요한계시록</strong> — 완성. 죽임당한 어린 양이 만왕의 왕으로 다스리시고, 바벨론은 무너지고, 동산은 도성이 되고, 고아였던 자녀들이 아버지의 얼굴을 보며 영원히 다스린다. 성경의 마지막 획이자, 모든 이야기의 첫 아침.</p>"}, {"id": "map", "label": "특별편", "title": "한 장의 그림 — 전체 지도", "mins": 2, "html": "\n<p>아래는 이 책 전체를 문자 그대로 <strong>한 장</strong>에 눌러 담은 그림이다. 위쪽의 활처럼 굽은 선은 창조에서 완성까지 이어지는 일곱 장면이고, 아래 시간축은 예순여섯 권이 서 있는 자리다. 그 사이를 두 가닥의 실이 달린다. 언약의 금실은 창세기 3장 15절에서 시작해 십자가와 완성까지 이어지고, 우상의 검은 실은 금송아지에서 바벨론까지 달리다가 요한계시록 18장에서 끝내 끊어진다.</p>\n<p>어느 책을 읽다가 길을 잃으면 이 그림으로 돌아오라. 지금 어느 장면, 어느 실 곁에 서 있는지 보일 것이다.</p>\n<figure class=\"map-fig\">\n<svg viewBox=\"0 0 960 590\" role=\"img\" aria-label=\"일곱 장면과 예순여섯 권의 지도\">\n  <defs><marker id=\"arr\" viewBox=\"0 0 8 8\" refX=\"6\" refY=\"4\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\"><path d=\"M0,0 L8,4 L0,8 z\" fill=\"#B08A2E\"/></marker></defs>\n  <!-- 이야기의 활: 일곱 장면 -->\n  <path d=\"M95,205 C160,120 260,105 330,130 C430,165 530,165 630,130 C700,105 800,120 865,205\" fill=\"none\" stroke=\"#CBB77E\" stroke-width=\"1.4\"/>\n  <g font-family=\"inherit\" text-anchor=\"middle\">\n    <g class=\"scn\"><circle cx=\"95\" cy=\"205\" r=\"17\"/><text x=\"95\" y=\"210\">1</text><text class=\"scnt\" x=\"95\" y=\"243\">창조</text></g>\n    <g class=\"scn\"><circle cx=\"185\" cy=\"140\" r=\"17\"/><text x=\"185\" y=\"145\">2</text><text class=\"scnt\" x=\"185\" y=\"178\">반역</text></g>\n    <g class=\"scn dark\"><circle cx=\"330\" cy=\"130\" r=\"17\"/><text x=\"330\" y=\"135\">3</text><text class=\"scnt\" x=\"330\" y=\"98\">우상</text></g>\n    <g class=\"scn gold\"><circle cx=\"470\" cy=\"160\" r=\"17\"/><text x=\"470\" y=\"165\">4</text><text class=\"scnt\" x=\"470\" y=\"128\">언약</text></g>\n    <g class=\"scn\"><circle cx=\"660\" cy=\"127\" r=\"17\"/><text x=\"660\" y=\"132\">5</text><text class=\"scnt\" x=\"660\" y=\"95\">성육신·십자가</text></g>\n    <g class=\"scn\"><circle cx=\"775\" cy=\"132\" r=\"17\"/><text x=\"775\" y=\"137\">6</text><text class=\"scnt\" x=\"775\" y=\"100\">부활·교회</text></g>\n    <g class=\"scn\"><circle cx=\"865\" cy=\"205\" r=\"17\"/><text x=\"865\" y=\"210\">7</text><text class=\"scnt\" x=\"865\" y=\"243\">완성</text></g>\n  </g>\n  <!-- 두 실 -->\n  <path d=\"M150,330 C300,318 430,342 545,330\" fill=\"none\" stroke=\"#B08A2E\" stroke-width=\"2.4\"/>\n  <path d=\"M615,330 C700,320 800,338 900,326\" fill=\"none\" stroke=\"#B08A2E\" stroke-width=\"2.4\" marker-end=\"url(#arr)\"/>\n  <path d=\"M210,352 C330,364 440,344 545,356\" fill=\"none\" stroke=\"#4A463F\" stroke-width=\"1.6\" stroke-dasharray=\"1 0\"/>\n  <path d=\"M615,356 C690,362 780,352 852,356\" fill=\"none\" stroke=\"#4A463F\" stroke-width=\"1.4\"/>\n  <path d=\"M846,349 l13,13 M859,349 l-13,13\" stroke=\"#4A463F\" stroke-width=\"1.6\"/>\n  <text x=\"152\" y=\"316\" class=\"thread gold-t\">언약의 금실 (창 3:15 → …)</text>\n  <text x=\"240\" y=\"382\" class=\"thread dark-t\">우상의 검은 실 (금송아지 → 바벨론, 계 18에서 끝)</text>\n  <!-- 시간축 -->\n  <line x1=\"60\" y1=\"440\" x2=\"560\" y2=\"440\" stroke=\"#1C1B18\" stroke-width=\"1.6\"/>\n  <line x1=\"565\" y1=\"440\" x2=\"615\" y2=\"440\" stroke=\"#8B8578\" stroke-width=\"1.4\" stroke-dasharray=\"4 5\"/>\n  <line x1=\"620\" y1=\"440\" x2=\"900\" y2=\"440\" stroke=\"#1C1B18\" stroke-width=\"1.6\"/>\n  <g font-family=\"inherit\" text-anchor=\"middle\" class=\"era\">\n    <g><line x1=\"60\" y1=\"434\" x2=\"60\" y2=\"446\" stroke=\"#1C1B18\"/><text x=\"98\" y=\"466\">창조시대</text></g>\n    <g><line x1=\"143\" y1=\"434\" x2=\"143\" y2=\"446\" stroke=\"#1C1B18\"/><text x=\"181\" y=\"466\">족장시대</text></g>\n    <g><line x1=\"226\" y1=\"434\" x2=\"226\" y2=\"446\" stroke=\"#1C1B18\"/><text x=\"264\" y=\"466\">모세시대</text></g>\n    <g><line x1=\"310\" y1=\"434\" x2=\"310\" y2=\"446\" stroke=\"#1C1B18\"/><text x=\"348\" y=\"466\">사사시대</text></g>\n    <g><line x1=\"393\" y1=\"434\" x2=\"393\" y2=\"446\" stroke=\"#1C1B18\"/><text x=\"431\" y=\"466\">왕정시대</text></g>\n    <g><line x1=\"476\" y1=\"434\" x2=\"476\" y2=\"446\" stroke=\"#1C1B18\"/><text x=\"518\" y=\"466\">포로·귀환</text></g>\n    <g><line x1=\"620\" y1=\"434\" x2=\"620\" y2=\"446\" stroke=\"#1C1B18\"/><text x=\"655\" y=\"466\">복음서</text></g>\n    <g><line x1=\"695\" y1=\"434\" x2=\"695\" y2=\"446\" stroke=\"#1C1B18\"/><text x=\"729\" y=\"466\">사도행전</text></g>\n    <g><line x1=\"762\" y1=\"434\" x2=\"762\" y2=\"446\" stroke=\"#1C1B18\"/><text x=\"796\" y=\"466\">서신서</text></g>\n    <g><line x1=\"838\" y1=\"434\" x2=\"838\" y2=\"446\" stroke=\"#1C1B18\"/><text x=\"869\" y=\"466\">계시록</text></g>\n  </g>\n  <text x=\"590\" y=\"425\" text-anchor=\"middle\" class=\"silence\">400년의 침묵</text>\n  <g class=\"bigl\" text-anchor=\"middle\">\n    <text x=\"310\" y=\"510\">구약 39권 — 왕을 기다리다</text>\n    <text x=\"760\" y=\"510\">신약 27권 — 그 왕이 오시다</text>\n  </g>\n  <g class=\"quest\" text-anchor=\"middle\">\n    <text x=\"310\" y=\"540\">“그 왕은 누구인가?”</text>\n    <text x=\"760\" y=\"540\">“그 왕은 예수님이다.”</text>\n  </g>\n  <!-- 우리의 자리 -->\n  <line x1=\"800\" y1=\"150\" x2=\"800\" y2=\"132\" stroke=\"#B08A2E\" stroke-width=\"1\" stroke-dasharray=\"2 3\"/>\n  <text x=\"806\" y=\"168\" class=\"here\">← 우리는 장면 6과 7 사이에 있다</text>\n</svg>\n</figure>"}, {"id": "wt1", "label": "웹툰", "title": "웹툰판 1화 — 왕의 세계, 왕좌를 넘본 왕자", "mins": 3, "html": "\n<div class=\"wt\">\n  <p class=\"wt-open\">세로로 천천히 내리며 읽는 웹툰판. 그림은 귀스타브 도레(1832–1883)의 성경 판화다.</p>\n\n  <div class=\"wt-label\">장면 1 · 왕의 세계</div>\n  <div class=\"wt-scene\">\n    <figure class=\"frame\"><img src=\"img/01-creation.jpg\" loading=\"lazy\" alt=\"도레 판화: 빛의 창조\"></figure>\n    <div class=\"narr on\">이야기는 왕좌에서 시작된다.<br>우주는 주인 없는 땅이 아니라, 한 분 왕의 나라다.</div>\n    <div class=\"say\">“빛이 있으라.”</div>\n  </div>\n\n  <div class=\"wt-scene\">\n    <figure class=\"frame\"><img src=\"img/fig-01-adam-eve.jpg\" loading=\"lazy\" alt=\"도레 판화: 에덴의 두 사람\"></figure>\n    <div class=\"narr on\">그 궁전의 마지막 날, 왕은 특별한 존재를 세웠다.<br>자녀이면서 통치자 — 한 단어로 하면, <strong>왕자</strong>.</div>\n    <div class=\"cap\">“영화와 존귀로 관을 씌우셨나이다” <span class=\"wref\">(시 8:5)</span></div>\n  </div>\n\n  <div class=\"wt-label\">장면 2 · 왕좌를 넘본 왕자</div>\n  <div class=\"wt-scene\">\n    <div class=\"say whisper\">“너희가… 하나님과 같이 되어…” <span class=\"wref\">(창 3:5)</span></div>\n    <figure class=\"frame\"><img src=\"img/02-fall.jpg\" loading=\"lazy\" alt=\"도레 판화: 에덴에서 쫓겨나는 두 사람\"></figure>\n    <div class=\"narr on\">이미 왕자였던 존재가, 왕이 되려 했다.<br>받은 관에 만족하지 못하고 아버지의 관을 넘봤다.</div>\n    <div class=\"narr\">반역자는 그 순간 고아가 되었다.<br>누가 내쫓기 전에, 스스로 등을 돌린 고아.</div>\n  </div>\n\n  <div class=\"wt-scene\">\n    <figure class=\"frame\"><img src=\"img/fig-02-cain-abel.jpg\" loading=\"lazy\" alt=\"도레 판화: 가인과 아벨\"></figure>\n    <div class=\"narr on\">반역은 번진다.<br>동산에서는 부부가 서로를 탓했고, 들에서는 형이 아우를 죽였다.</div>\n  </div>\n\n  <div class=\"wt-scene\">\n    <figure class=\"frame\"><img src=\"img/fig-03-noah.jpg\" loading=\"lazy\" alt=\"도레 판화: 방주에서 내보낸 비둘기\"></figure>\n    <div class=\"narr on\">그러나 심판이 선고되는 자리마다, 이상한 표가 하나씩 찍혀 있었다.<br>방주가 있었고, 비둘기가 돌아왔고, 구름 속에 무지개가 걸렸다.</div>\n    <div class=\"narr\">심판은 한 번도 마침표인 적이 없다. 언제나 쉼표였다.</div>\n  </div>\n\n  <div class=\"wt-scene\">\n    <figure class=\"frame\"><img src=\"img/fig-04-babel.jpg\" loading=\"lazy\" alt=\"도레 판화: 바벨탑\"></figure>\n    <div class=\"say\">“우리 이름을 내고…” <span class=\"wref\">(창 11:4)</span></div>\n    <div class=\"narr on\">왕좌를 향해 뻗었던 그 손이, 이번에는 하늘에 닿는 탑을 쌓는다.</div>\n  </div>\n\n  <div class=\"wt-end\">\n    <p>그때, 온 땅에 흩어진 사람들 사이로<br>한 음성이 아직 걷고 있었다.</p>\n    <p class=\"wt-callout\">“네가 어디 있느냐” <span class=\"wref\">(창 3:9)</span></p>\n    <p class=\"wt-next\">2화 — 온 세상을 되찾기 위한 한 가정 · 계속</p>\n  </div>\n  <p class=\"credit\">그림: Gustave Doré, <em>La Grande Bible de Tours</em> (1866) — 퍼블릭 도메인 (Wikimedia Commons)</p>\n</div>\n"}, {"id": "wtkids", "label": "어린이", "title": "어린이 웹툰 1화 — 임금님의 정원", "mins": 3, "html": "\n<div class=\"wtk\">\n  <p class=\"wtk-open\">글자를 몰라도 그림만 보고 따라올 수 있어요. 천천히 내려 보세요!</p>\n\n  <svg class=\"wtk-panel\" viewBox=\"0 0 800 520\" role=\"img\" aria-label=\"깜깜한 어둠 속에 빛이 생겨나는 그림\">\n    <rect width=\"800\" height=\"520\" rx=\"28\" fill=\"#2B3A67\"/>\n    <circle cx=\"140\" cy=\"90\" r=\"4\" fill=\"#FFF8E7\"/><circle cx=\"240\" cy=\"150\" r=\"3\" fill=\"#FFF8E7\"/><circle cx=\"660\" cy=\"110\" r=\"4\" fill=\"#FFF8E7\"/><circle cx=\"580\" cy=\"70\" r=\"3\" fill=\"#FFF8E7\"/><circle cx=\"710\" cy=\"210\" r=\"3\" fill=\"#FFF8E7\"/>\n    <circle cx=\"400\" cy=\"280\" r=\"150\" fill=\"#FFD75E\" opacity=\".25\"/>\n    <circle cx=\"400\" cy=\"280\" r=\"105\" fill=\"#FFD75E\" opacity=\".45\"/>\n    <circle cx=\"400\" cy=\"280\" r=\"64\" fill=\"#FFE9A8\"/>\n    <g stroke=\"#FFD75E\" stroke-width=\"7\" stroke-linecap=\"round\">\n      <line x1=\"400\" y1=\"120\" x2=\"400\" y2=\"165\"/><line x1=\"400\" y1=\"395\" x2=\"400\" y2=\"440\"/>\n      <line x1=\"245\" y1=\"280\" x2=\"290\" y2=\"280\"/><line x1=\"510\" y1=\"280\" x2=\"555\" y2=\"280\"/>\n      <line x1=\"292\" y1=\"172\" x2=\"323\" y2=\"203\"/><line x1=\"477\" y1=\"357\" x2=\"508\" y2=\"388\"/>\n      <line x1=\"508\" y1=\"172\" x2=\"477\" y2=\"203\"/><line x1=\"323\" y1=\"357\" x2=\"292\" y2=\"388\"/>\n    </g>\n    <g>\n      <rect x=\"255\" y=\"30\" width=\"290\" height=\"64\" rx=\"32\" fill=\"#FFF8E7\"/>\n      <path d=\"M380,94 l12,20 l16,-20 z\" fill=\"#FFF8E7\"/>\n      <text x=\"400\" y=\"72\" text-anchor=\"middle\" font-size=\"30\" font-weight=\"700\" fill=\"#B08A2E\">“빛이 있으라!”</text>\n    </g>\n  </svg>\n  <div class=\"wtk-narr\">아주아주 옛날, 아무것도 없던 깜깜한 어둠 속에서<br><strong>임금님의 목소리</strong>가 온 세상을 만들었어요.</div>\n\n  <svg class=\"wtk-panel\" viewBox=\"0 0 800 520\" role=\"img\" aria-label=\"동산에서 왕관을 쓴 두 사람과 동물들이 웃고 있는 그림\">\n    <rect width=\"800\" height=\"520\" rx=\"28\" fill=\"#A8D8F0\"/>\n    <circle cx=\"690\" cy=\"95\" r=\"52\" fill=\"#FFD75E\"/>\n    <path d=\"M668,102 q22,18 44,0\" stroke=\"#E8A33D\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"/>\n    <circle cx=\"674\" cy=\"86\" r=\"5\" fill=\"#8B5E3C\"/><circle cx=\"706\" cy=\"86\" r=\"5\" fill=\"#8B5E3C\"/>\n    <ellipse cx=\"200\" cy=\"520\" rx=\"420\" ry=\"150\" fill=\"#9BCB63\"/>\n    <ellipse cx=\"700\" cy=\"540\" rx=\"380\" ry=\"140\" fill=\"#83B94E\"/>\n    <rect x=\"95\" y=\"235\" width=\"26\" height=\"105\" rx=\"10\" fill=\"#8B5E3C\"/>\n    <circle cx=\"108\" cy=\"200\" r=\"62\" fill=\"#5FA845\"/><circle cx=\"65\" cy=\"235\" r=\"42\" fill=\"#5FA845\"/><circle cx=\"155\" cy=\"235\" r=\"42\" fill=\"#5FA845\"/>\n    <circle cx=\"85\" cy=\"205\" r=\"9\" fill=\"#FF6B5E\"/><circle cx=\"130\" cy=\"185\" r=\"9\" fill=\"#FF6B5E\"/><circle cx=\"140\" cy=\"228\" r=\"9\" fill=\"#FF6B5E\"/>\n    <g><!-- 아담 -->\n      <circle cx=\"360\" cy=\"330\" r=\"34\" fill=\"#FBD6B0\"/>\n      <path d=\"M332,312 a34,34 0 0 1 56,-6 l-6,-14 a34,20 0 0 0 -46,8 z\" fill=\"#6B4A2F\"/>\n      <circle cx=\"349\" cy=\"330\" r=\"4\" fill=\"#3B2B1B\"/><circle cx=\"371\" cy=\"330\" r=\"4\" fill=\"#3B2B1B\"/>\n      <path d=\"M350,344 q10,9 20,0\" stroke=\"#3B2B1B\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\"/>\n      <circle cx=\"340\" cy=\"341\" r=\"5\" fill=\"#F8A98F\" opacity=\".7\"/><circle cx=\"380\" cy=\"341\" r=\"5\" fill=\"#F8A98F\" opacity=\".7\"/>\n      <polygon points=\"338,296 348,278 360,294 372,276 382,296\" fill=\"#FFD75E\" stroke=\"#E8A33D\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n      <rect x=\"334\" y=\"362\" width=\"52\" height=\"66\" rx=\"24\" fill=\"#FF8B6A\"/>\n      <line x1=\"334\" y1=\"382\" x2=\"306\" y2=\"404\" stroke=\"#FBD6B0\" stroke-width=\"11\" stroke-linecap=\"round\"/>\n      <line x1=\"386\" y1=\"382\" x2=\"416\" y2=\"368\" stroke=\"#FBD6B0\" stroke-width=\"11\" stroke-linecap=\"round\"/>\n    </g>\n    <g><!-- 하와 -->\n      <circle cx=\"475\" cy=\"340\" r=\"34\" fill=\"#FBD6B0\"/>\n      <path d=\"M444,330 a36,36 0 0 1 62,-2 l6,40 a10,10 0 0 1 -14,2 l-2,-22 l-36,0 l-2,22 a10,10 0 0 1 -14,-2 z\" fill=\"#3B2B1B\"/>\n      <circle cx=\"464\" cy=\"342\" r=\"4\" fill=\"#3B2B1B\"/><circle cx=\"486\" cy=\"342\" r=\"4\" fill=\"#3B2B1B\"/>\n      <path d=\"M465,356 q10,9 20,0\" stroke=\"#3B2B1B\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\"/>\n      <circle cx=\"455\" cy=\"353\" r=\"5\" fill=\"#F8A98F\" opacity=\".7\"/><circle cx=\"495\" cy=\"353\" r=\"5\" fill=\"#F8A98F\" opacity=\".7\"/>\n      <polygon points=\"453,306 463,288 475,304 487,286 497,306\" fill=\"#FFD75E\" stroke=\"#E8A33D\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n      <rect x=\"449\" y=\"372\" width=\"52\" height=\"60\" rx=\"24\" fill=\"#7FB6E8\"/>\n      <line x1=\"449\" y1=\"392\" x2=\"424\" y2=\"376\" stroke=\"#FBD6B0\" stroke-width=\"11\" stroke-linecap=\"round\"/>\n      <line x1=\"501\" y1=\"392\" x2=\"528\" y2=\"410\" stroke=\"#FBD6B0\" stroke-width=\"11\" stroke-linecap=\"round\"/>\n    </g>\n    <g><!-- 토끼 -->\n      <ellipse cx=\"620\" cy=\"440\" rx=\"30\" ry=\"24\" fill=\"#FFFFFF\"/>\n      <circle cx=\"644\" cy=\"420\" r=\"17\" fill=\"#FFFFFF\"/>\n      <ellipse cx=\"637\" cy=\"398\" rx=\"6\" ry=\"15\" fill=\"#FFFFFF\"/><ellipse cx=\"652\" cy=\"398\" rx=\"6\" ry=\"15\" fill=\"#FFFFFF\"/>\n      <circle cx=\"641\" cy=\"418\" r=\"2.6\" fill=\"#3B2B1B\"/><circle cx=\"650\" cy=\"418\" r=\"2.6\" fill=\"#3B2B1B\"/>\n    </g>\n    <g><!-- 양 -->\n      <ellipse cx=\"245\" cy=\"445\" rx=\"36\" ry=\"26\" fill=\"#FFF8E7\"/>\n      <circle cx=\"222\" cy=\"432\" r=\"8\" fill=\"#FFF8E7\"/><circle cx=\"238\" cy=\"425\" r=\"9\" fill=\"#FFF8E7\"/><circle cx=\"256\" cy=\"425\" r=\"9\" fill=\"#FFF8E7\"/><circle cx=\"270\" cy=\"433\" r=\"8\" fill=\"#FFF8E7\"/>\n      <circle cx=\"282\" cy=\"446\" r=\"13\" fill=\"#EED9C4\"/><circle cx=\"279\" cy=\"443\" r=\"2.4\" fill=\"#3B2B1B\"/><circle cx=\"288\" cy=\"443\" r=\"2.4\" fill=\"#3B2B1B\"/>\n    </g>\n    <g>\n      <rect x=\"272\" y=\"118\" width=\"330\" height=\"96\" rx=\"26\" fill=\"#FFFFFF\"/>\n      <path d=\"M370,214 l10,22 l18,-22 z\" fill=\"#FFFFFF\"/>\n      <text x=\"437\" y=\"158\" text-anchor=\"middle\" font-size=\"24\" font-weight=\"700\" fill=\"#2B3A67\">“우와! 이걸 전부</text>\n      <text x=\"437\" y=\"192\" text-anchor=\"middle\" font-size=\"24\" font-weight=\"700\" fill=\"#2B3A67\">우리가 돌보는 거야?”</text>\n    </g>\n  </svg>\n  <div class=\"wtk-narr\">임금님은 마지막 날, 사람을 만들고 <strong>금 왕관</strong>을 씌워 주셨어요.<br>“너희는 내 아이들이야. 이 정원을 함께 다스리자!”</div>\n\n  <svg class=\"wtk-panel\" viewBox=\"0 0 800 520\" role=\"img\" aria-label=\"나무 위 뱀이 열매를 먹으라고 꼬드기는 그림\">\n    <rect width=\"800\" height=\"520\" rx=\"28\" fill=\"#BFE3B4\"/>\n    <rect x=\"330\" y=\"180\" width=\"42\" height=\"240\" rx=\"16\" fill=\"#8B5E3C\"/>\n    <circle cx=\"352\" cy=\"150\" r=\"105\" fill=\"#5FA845\"/><circle cx=\"270\" cy=\"200\" r=\"66\" fill=\"#5FA845\"/><circle cx=\"440\" cy=\"200\" r=\"66\" fill=\"#5FA845\"/>\n    <circle cx=\"310\" cy=\"160\" r=\"13\" fill=\"#FF6B5E\"/><circle cx=\"395\" cy=\"135\" r=\"13\" fill=\"#FF6B5E\"/><circle cx=\"425\" cy=\"205\" r=\"13\" fill=\"#FF6B5E\"/>\n    <path d=\"M300,205 q-40,20 -20,52 q18,30 -14,44\" fill=\"none\" stroke=\"#4E9B44\" stroke-width=\"16\" stroke-linecap=\"round\"/>\n    <circle cx=\"268\" cy=\"303\" r=\"20\" fill=\"#4E9B44\"/>\n    <circle cx=\"261\" cy=\"299\" r=\"3.4\" fill=\"#1C1B18\"/><circle cx=\"275\" cy=\"299\" r=\"3.4\" fill=\"#1C1B18\"/>\n    <path d=\"M262,309 q6,5 12,0\" stroke=\"#1C1B18\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"/>\n    <path d=\"M268,323 l0,12 m0,0 l-6,7 m6,-7 l6,7\" stroke=\"#D9534F\" stroke-width=\"3.6\" fill=\"none\" stroke-linecap=\"round\"/>\n    <g>\n      <rect x=\"330\" y=\"300\" width=\"360\" height=\"96\" rx=\"26\" fill=\"#FFFFFF\"/>\n      <path d=\"M352,348 l-36,-16 l36,-14 z\" fill=\"#FFFFFF\"/>\n      <text x=\"510\" y=\"340\" text-anchor=\"middle\" font-size=\"24\" font-weight=\"700\" fill=\"#4E7B3A\">“이 열매 먹으면 너희도</text>\n      <text x=\"510\" y=\"374\" text-anchor=\"middle\" font-size=\"24\" font-weight=\"700\" fill=\"#4E7B3A\">임금님처럼 될걸~?”</text>\n    </g>\n    <text x=\"640\" y=\"452\" font-size=\"34\" font-weight=\"700\" fill=\"#2B3A67\">…?!</text>\n  </svg>\n  <div class=\"wtk-narr\">그런데 어느 날, 뱀이 살금살금 다가와 속삭였어요.<br>왕자와 공주는 그만… <strong>임금님의 의자</strong>가 탐이 났어요.</div>\n\n  <svg class=\"wtk-panel\" viewBox=\"0 0 800 520\" role=\"img\" aria-label=\"해 저무는 길을 두 사람이 시무룩하게 걸어가고 땅에 깨진 왕관이 떨어져 있는 그림\">\n    <rect width=\"800\" height=\"520\" rx=\"28\" fill=\"#F2B880\"/>\n    <circle cx=\"400\" cy=\"150\" r=\"70\" fill=\"#F2955E\"/>\n    <ellipse cx=\"400\" cy=\"560\" rx=\"520\" ry=\"180\" fill=\"#B0764E\"/>\n    <g opacity=\".92\"><!-- 두 사람 뒷모습 -->\n      <circle cx=\"560\" cy=\"330\" r=\"26\" fill=\"#6B4A2F\"/>\n      <rect x=\"540\" y=\"352\" width=\"40\" height=\"56\" rx=\"18\" fill=\"#C96A4A\"/>\n      <circle cx=\"640\" cy=\"342\" r=\"26\" fill=\"#3B2B1B\"/>\n      <rect x=\"620\" y=\"364\" width=\"40\" height=\"52\" rx=\"18\" fill=\"#5E82A8\"/>\n    </g>\n    <g transform=\"translate(200,382) rotate(-28)\">\n      <rect x=\"0\" y=\"40\" width=\"96\" height=\"20\" rx=\"8\" fill=\"#FFD75E\" stroke=\"#E8A33D\" stroke-width=\"4\"/>\n      <polygon points=\"2,44 16,4 34,34 48,0 62,34 80,4 94,44\" fill=\"#FFD75E\" stroke=\"#E8A33D\" stroke-width=\"4\" stroke-linejoin=\"round\"/>\n      <line x1=\"48\" y1=\"10\" x2=\"58\" y2=\"58\" stroke=\"#B0764E\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n      <circle cx=\"16\" cy=\"8\" r=\"5\" fill=\"#FF8B6A\"/><circle cx=\"80\" cy=\"8\" r=\"5\" fill=\"#7FB6E8\"/>\n    </g>\n    <text x=\"180\" y=\"352\" font-size=\"30\" fill=\"#8A4B2E\">💧</text>\n    <text x=\"690\" y=\"300\" font-size=\"26\" fill=\"#8A4B2E\">…</text>\n  </svg>\n  <div class=\"wtk-narr\">약속을 어긴 두 사람은 정원을 떠나야 했어요.<br>반짝이던 왕관은 <strong>쨍그랑</strong> — 금이 가고 말았지요.</div>\n\n  <svg class=\"wtk-panel\" viewBox=\"0 0 800 520\" role=\"img\" aria-label=\"비 오는 바다 위 방주와 무지개, 비둘기 그림\">\n    <rect width=\"800\" height=\"520\" rx=\"28\" fill=\"#9FBFD8\"/>\n    <g stroke=\"#7FA6C4\" stroke-width=\"5\" stroke-linecap=\"round\">\n      <line x1=\"120\" y1=\"60\" x2=\"105\" y2=\"100\"/><line x1=\"230\" y1=\"45\" x2=\"215\" y2=\"85\"/><line x1=\"640\" y1=\"55\" x2=\"625\" y2=\"95\"/><line x1=\"720\" y1=\"90\" x2=\"705\" y2=\"130\"/>\n    </g>\n    <path d=\"M185,320 a215,215 0 0 1 430,0\" fill=\"none\" stroke=\"#FF6B5E\" stroke-width=\"15\" stroke-linecap=\"round\"/>\n    <path d=\"M207,320 a193,193 0 0 1 386,0\" fill=\"none\" stroke=\"#FFD75E\" stroke-width=\"15\" stroke-linecap=\"round\"/>\n    <path d=\"M229,320 a171,171 0 0 1 342,0\" fill=\"none\" stroke=\"#9BCB63\" stroke-width=\"15\" stroke-linecap=\"round\"/>\n    <path d=\"M251,320 a149,149 0 0 1 298,0\" fill=\"none\" stroke=\"#7FB6E8\" stroke-width=\"15\" stroke-linecap=\"round\"/>\n    <path d=\"M0,430 q100,-26 200,0 t200,0 t200,0 t200,0 v90 h-800 z\" fill=\"#4E7BA6\"/>\n    <g><!-- 방주 -->\n      <path d=\"M240,392 q160,50 320,0 l-28,66 q-132,36 -264,0 z\" fill=\"#8B5E3C\"/>\n      <rect x=\"330\" y=\"330\" width=\"140\" height=\"64\" rx=\"12\" fill=\"#C68B5C\"/>\n      <rect x=\"352\" y=\"346\" width=\"30\" height=\"26\" rx=\"8\" fill=\"#FFF3D6\"/><rect x=\"418\" y=\"346\" width=\"30\" height=\"26\" rx=\"8\" fill=\"#FFF3D6\"/>\n      <circle cx=\"367\" cy=\"359\" r=\"8\" fill=\"#C4C4C4\"/><circle cx=\"374\" cy=\"352\" r=\"5\" fill=\"#8A8A8A\"/>\n      <circle cx=\"433\" cy=\"360\" r=\"9\" fill=\"#E8B04B\"/><circle cx=\"441\" cy=\"353\" r=\"4\" fill=\"#8A5A1B\"/>\n    </g>\n    <g><!-- 비둘기 -->\n      <ellipse cx=\"565\" cy=\"285\" rx=\"20\" ry=\"13\" fill=\"#FFFFFF\"/>\n      <circle cx=\"583\" cy=\"277\" r=\"9\" fill=\"#FFFFFF\"/><circle cx=\"586\" cy=\"275\" r=\"2\" fill=\"#3B2B1B\"/>\n      <path d=\"M560,280 q-14,-18 4,-24\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n      <path d=\"M592,272 q10,-4 14,2 q-6,6 -14,3\" fill=\"#9BCB63\"/>\n    </g>\n  </svg>\n  <div class=\"wtk-narr\">사람들의 마음은 점점 더 어두워졌지만 —<br>임금님은 <strong>한 번도</strong> 포기하지 않으셨어요. 무지개는 임금님의 약속 도장이에요!</div>\n\n  <svg class=\"wtk-panel\" viewBox=\"0 0 800 520\" role=\"img\" aria-label=\"사람들이 블록을 쌓아 기울어진 높은 탑을 만드는 그림\">\n    <rect width=\"800\" height=\"520\" rx=\"28\" fill=\"#F5DEB8\"/>\n    <ellipse cx=\"400\" cy=\"560\" rx=\"520\" ry=\"160\" fill=\"#E0B87E\"/>\n    <g transform=\"rotate(-4 400 300)\">\n      <rect x=\"300\" y=\"360\" width=\"200\" height=\"60\" rx=\"10\" fill=\"#D98B5F\"/>\n      <rect x=\"318\" y=\"300\" width=\"164\" height=\"58\" rx=\"10\" fill=\"#E8A874\"/>\n      <rect x=\"336\" y=\"242\" width=\"128\" height=\"56\" rx=\"10\" fill=\"#D98B5F\"/>\n      <rect x=\"354\" y=\"188\" width=\"92\" height=\"52\" rx=\"10\" fill=\"#E8A874\"/>\n      <rect x=\"370\" y=\"140\" width=\"60\" height=\"46\" rx=\"10\" fill=\"#D98B5F\"/>\n    </g>\n    <g><!-- 블록 든 사람 -->\n      <circle cx=\"205\" cy=\"415\" r=\"22\" fill=\"#FBD6B0\"/>\n      <path d=\"M187,402 a22,22 0 0 1 36,-4 l-4,-10 a22,14 0 0 0 -30,6 z\" fill=\"#3B2B1B\"/>\n      <circle cx=\"198\" cy=\"415\" r=\"3\" fill=\"#3B2B1B\"/><circle cx=\"212\" cy=\"415\" r=\"3\" fill=\"#3B2B1B\"/>\n      <rect x=\"188\" y=\"436\" width=\"36\" height=\"46\" rx=\"16\" fill=\"#C96A4A\"/>\n      <rect x=\"176\" y=\"392\" width=\"34\" height=\"22\" rx=\"5\" fill=\"#D98B5F\"/>\n    </g>\n    <g>\n      <rect x=\"470\" y=\"60 \" width=\"270\" height=\"96\" rx=\"26\" fill=\"#FFFFFF\"/>\n      <path d=\"M520,156 l6,22 l20,-20 z\" fill=\"#FFFFFF\"/>\n      <text x=\"605\" y=\"100\" text-anchor=\"middle\" font-size=\"24\" font-weight=\"700\" fill=\"#8A4B2E\">“우리 이름을</text>\n      <text x=\"605\" y=\"134\" text-anchor=\"middle\" font-size=\"24\" font-weight=\"700\" fill=\"#8A4B2E\">하늘까지 올리자!”</text>\n    </g>\n  </svg>\n  <div class=\"wtk-narr\">사람들은 이번엔 하늘까지 닿는 탑을 쌓기 시작했어요.<br>임금님 없이, 자기들 이름만으로요. 어쩐지… 탑이 삐뚤빼뚤하지요?</div>\n\n  <svg class=\"wtk-panel\" viewBox=\"0 0 800 400\" role=\"img\" aria-label=\"어두운 들판 위로 따뜻한 금빛 빛줄기가 내려오는 그림\">\n    <rect width=\"800\" height=\"400\" rx=\"28\" fill=\"#2B3A67\"/>\n    <circle cx=\"150\" cy=\"70\" r=\"3\" fill=\"#FFF8E7\"/><circle cx=\"650\" cy=\"90\" r=\"4\" fill=\"#FFF8E7\"/><circle cx=\"560\" cy=\"50\" r=\"3\" fill=\"#FFF8E7\"/>\n    <path d=\"M330,0 L470,0 L560,400 L240,400 z\" fill=\"#FFD75E\" opacity=\".22\"/>\n    <path d=\"M360,0 L440,0 L500,400 L300,400 z\" fill=\"#FFD75E\" opacity=\".3\"/>\n    <ellipse cx=\"400\" cy=\"420\" rx=\"520\" ry=\"90\" fill=\"#1E2A4A\"/>\n    <g>\n      <rect x=\"212\" y=\"120\" width=\"376\" height=\"76\" rx=\"38\" fill=\"#FFF8E7\"/>\n      <text x=\"400\" y=\"170\" text-anchor=\"middle\" font-size=\"32\" font-weight=\"700\" fill=\"#B08A2E\">“얘야, 어디 있니?”</text>\n    </g>\n  </svg>\n  <div class=\"wtk-narr\">그런데 그거 아세요?<br>그 캄캄한 밤에도, 아이들을 찾는 <strong>아빠의 목소리</strong>는 멈추지 않았어요.</div>\n  <div class=\"wtk-next\">다음 화 — 임금님이 한 가족을 찾아가요! 🐑✨</div>\n</div>\n"}, {"id": "epilogue", "label": "에필로그", "title": "그림을 걸며", "mins": 1, "html": "<p>이것으로 그림이 완성되었다. 한 문장의 스케치에서 시작해, 두 덩어리의 밑그림을 거쳐, 일곱 장면의 윤곽선을 긋고, 예순여섯 권의 형태를 세우고, 구약과 신약에 색을 입히고, 마지막 붓질까지 마쳤다.</p>\n<p>그러나 이 책의 목적은 그림을 벽에 걸어 두고 감상하는 것이 아니다. 지도는 여행을 대신하지 못한다. 이 책이 드린 것은 숲의 지도일 뿐, 숲의 냄새와 바람은 성경을 직접 펼치는 사람만 안다. 다만 이제 당신은 빈손으로 들어가지 않는다. 레위기의 제사 규정 앞에서도, 소선지서의 낯선 이름들 앞에서도, 지금 큰 그림의 어느 자리에 서 있는지 알고 있기 때문이다.</p>\n<p>성경의 첫 질문은 숨은 자를 찾는 아버지의 음성이었다. \"네가 어디 있느냐\"<span class=\"vref\">(창 3:9)</span>. 그리고 성경의 마지막 초청은 이렇게 열려 있다. \"성령과 신부가 말씀하시기를 오라 하시는도다... 원하는 자는 값없이 생명수를 받으라\"<span class=\"vref\">(계 22:17)</span>. 그 사이의 예순여섯 권 전부가, 결국 한 방향을 가리키는 길 표지판이다.</p>\n<p>다시, 아버지의 집으로.</p>"}];
const $ = s => document.querySelector(s);
const readSet = () => new Set(JSON.parse(localStorage.getItem('apjib-read')||'[]'));
const markRead = id => { const s = readSet(); s.add(id); localStorage.setItem('apjib-read', JSON.stringify([...s])); };

const STITCH = `<svg class="stitch" viewBox="0 0 190 16" aria-hidden="true">
<path d="M2,8 C22,2 38,14 58,8 C78,2 94,14 114,8 C134,2 150,14 170,8 L188,8" fill="none" stroke="#B08A2E" stroke-width="1.5"/>
<circle cx="2" cy="8" r="2.2" fill="#B08A2E"/><circle cx="188" cy="8" r="2.2" fill="#B08A2E"/></svg>`;

function home(){
  const rs = readSet();
  document.title = '다시, 아버지의 집으로';
  $('#app').innerHTML = `
  <div class="cover">
    <div class="eyebrow">한 장의 그림으로 읽는 성경</div>
    <h1 class="title">다시, 아버지의 집으로</h1>
    <p class="subtitle">일곱 장면과 예순여섯 권 — 연재로 읽는 성경 전체 이야기</p>
    ${STITCH}
  </div>
  <ul class="toc">${EPS.map(e=>`
    <li class="${rs.has(e.id)?'read':''}"><a href="#/${e.id}">
      <span class="num">${e.label}</span>
      <span class="t">${e.title}</span>
      <span class="meta"><span>약 ${e.mins}분</span><span class="dot" title="${rs.has(e.id)?'읽음':'안 읽음'}"></span></span>
    </a></li>`).join('')}
  </ul>
  <footer>『다시, 아버지의 집으로』 (가제) · 초고 연재판</footer>`;
  window.scrollTo(0,0);
}

function reader(id){
  const i = EPS.findIndex(e=>e.id===id);
  if(i<0) return home();
  const e = EPS[i], prev = EPS[i-1], next = EPS[i+1];
  document.title = `${e.title} — 다시, 아버지의 집으로`;
  markRead(e.id);
  $('#app').innerHTML = `
  <div class="reader-top"><div class="in">
    <a href="#/">← 목차</a><span class="ep">${e.label}</span>
    <a href="${next?'#/'+next.id:'#/'}">${next?'다음 →':'목차'}</a>
  </div></div>
  <article>
    <div class="ep-label">${e.label}</div>
    <h2 class="ep-title">${e.title}</h2>
    <div class="ep-rule"></div>
    ${e.html}
    <nav class="epnav">
      <a class="prev ${prev?'':'ghost'}" href="${prev?'#/'+prev.id:'#'}"><span class="dir">← 이전 화</span><span class="nt">${prev?prev.label+' · '+prev.title:''}</span></a>
      <a class="next ${next?'':'ghost'}" href="${next?'#/'+next.id:'#'}"><span class="dir">다음 화 →</span><span class="nt">${next?next.label+' · '+next.title:''}</span></a>
    </nav>
  </article>
  <footer>『다시, 아버지의 집으로』 (가제) · 초고 연재판</footer>`;
  window.scrollTo(0,0);
}

function route(){
  const h = location.hash.replace(/^#\/?/, '');
  h ? reader(h) : home();
}
addEventListener('hashchange', route);
addEventListener('scroll', () => {
  const d = document.documentElement;
  const p = d.scrollHeight - d.clientHeight;
  $('#thread').style.width = (p>0 ? (d.scrollTop/p*100) : 0) + '%';
}, {passive:true});

/* 리더 안에서만 이동식 sticky 헤더가 목차로 돌아가는 링크를 이미 제공 */
route();
</script>
